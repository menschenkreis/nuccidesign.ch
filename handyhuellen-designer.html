<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Handyhüllen Designer — NucciDesigner</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#e8e8ed;overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column;align-items:center}

    .back-link{position:fixed;top:16px;left:16px;z-index:100;color:rgba(255,255,255,.4);text-decoration:none;font-size:.8rem;font-weight:600;padding:8px 14px;border-radius:100px;border:1px solid rgba(255,255,255,.1);background:rgba(0,0,0,.3);backdrop-filter:blur(8px)}

    .app-header{padding:60px 16px 20px;text-align:center}
    .title{font-size:1.8rem;font-weight:900;letter-spacing:-.03em;margin-bottom:8px;background:linear-gradient(135deg, #7c6aef, #f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .subtitle{font-size:.85rem;color:rgba(255,255,255,.4);max-width:280px;margin:0 auto}

    .designer-main{display:flex;flex-direction:column;align-items:center;gap:30px;width:100%;max-width:600px;padding:20px}

    /* Case Preview */
    .preview-container{position:relative;width:220px;height:440px;filter:drop-shadow(0 20px 40px rgba(0,0,0,0.5))}
    .phone-case{position:absolute;inset:0;background:#1a1a1a;border-radius:40px;border:4px solid #333;overflow:hidden;transition:background-color 0.3s}
    .camera-cutout{position:absolute;top:30px;left:30px;width:60px;height:60px;background:#000;border-radius:12px;border:2px solid #333}
    .camera-lens{position:absolute;width:20px;height:20px;background:#111;border-radius:50%;border:1px solid #222}
    .lens-1{top:8px;left:8px}.lens-2{top:32px;left:32px}

    #glitterCanvas{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity 0.3s}

    /* Controls */
    .controls{width:100%;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:24px;padding:24px;display:flex;flex-direction:column;gap:20px}
    .control-group{display:flex;flex-direction:column;gap:10px}
    .label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:rgba(255,255,255,.4)}

    .color-grid{display:grid;grid-template-columns:repeat(6, 1fr);gap:8px}
    .color-btn{width:100%;aspect-ratio:1;border-radius:10px;border:2px solid transparent;cursor:pointer;transition:transform 0.2s}
    .color-btn.active{border-color:white;transform:scale(1.1)}

    .glitter-switch{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.05);padding:12px 16px;border-radius:14px;cursor:pointer}
    .toggle{width:44px;height:24px;background:rgba(255,255,255,.1);border-radius:100px;position:relative;transition:0.3s}
    .toggle::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;background:white;border-radius:50%;transition:0.3s}
    .glitter-switch.active .toggle{background:#7c6aef}
    .glitter-switch.active .toggle::after{left:23px}

    .save-btn{background:linear-gradient(135deg,#7c6aef,#f472b6);border:none;color:white;padding:16px;border-radius:100px;font-size:.9rem;font-weight:800;font-family:inherit;cursor:pointer;width:100%;margin-top:10px;box-shadow:0 8px 20px rgba(124,106,239,.3)}
    .save-btn:active{transform:scale(.97);opacity:.9}

    .toast{position:fixed;bottom:30px;background:rgba(255,255,255,.1);backdrop-filter:blur(10px);padding:10px 20px;border-radius:100px;font-size:.8rem;visibility:hidden;opacity:0;transition:0.3s}
    .toast.show{visibility:visible;opacity:1;bottom:40px}
  </style>
</head>
<body>
  <a href="index.html" class="back-link">← Zrugg</a>

  <header class="app-header">
    <h1 class="title">Case Designer</h1>
    <p class="subtitle">Design dini eigeni Handyhülle mit Farbe und Glitzer!</p>
  </header>

  <main class="designer-main">
    <div class="preview-container" id="captureArea">
      <div class="phone-case" id="casePreview">
        <div class="camera-cutout">
          <div class="camera-lens lens-1"></div>
          <div class="camera-lens lens-2"></div>
        </div>
        <canvas id="glitterCanvas"></canvas>
      </div>
    </div>

    <div class="controls">
      <div class="control-group">
        <span class="label">Hülle Farbe</span>
        <div class="color-grid">
          <div class="color-btn active" style="background:#1a1a1a" onclick="setColor('#1a1a1a', this)"></div>
          <div class="color-btn" style="background:#7c6aef" onclick="setColor('#7c6aef', this)"></div>
          <div class="color-btn" style="background:#f472b6" onclick="setColor('#f472b6', this)"></div>
          <div class="color-btn" style="background:#ffffff" onclick="setColor('#ffffff', this)"></div>
          <div class="color-btn" style="background:#ef4444" onclick="setColor('#ef4444', this)"></div>
          <div class="color-btn" style="background:#10b981" onclick="setColor('#10b981', this)"></div>
          <div class="color-btn" style="background:#3b82f6" onclick="setColor('#3b82f6', this)"></div>
          <div class="color-btn" style="background:#f59e0b" onclick="setColor('#f59e0b', this)"></div>
          <div class="color-btn" style="background:#6366f1" onclick="setColor('#6366f1', this)"></div>
          <div class="color-btn" style="background:#ec4899" onclick="setColor('#ec4899', this)"></div>
          <div class="color-btn" style="background:#8b5cf6" onclick="setColor('#8b5cf6', this)"></div>
          <div class="color-btn" style="background:#22c55e" onclick="setColor('#22c55e', this)"></div>
        </div>
      </div>

      <div class="control-group">
        <div class="glitter-switch" id="glitterToggle" onclick="toggleGlitter()">
          <span style="font-weight:600">✨ Glitzer Effekt</span>
          <div class="toggle"></div>
        </div>
      </div>

      <button class="save-btn" onclick="saveDesign()">Design Speichere 📸</button>
    </div>
  </main>

  <div class="toast" id="toast">Gspeicheret! ✨</div>

  <!-- Using html2canvas for saving if available, otherwise just mock -->
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <script>
    const casePreview = document.getElementById('casePreview');
    const glitterCanvas = document.getElementById('glitterCanvas');
    const ctx = glitterCanvas.getContext('2d');
    const glitterToggle = document.getElementById('glitterToggle');
    
    let glitterEnabled = false;
    let particles = [];

    function init() {
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);
      createGlitter();
      loop();
    }

    function resizeCanvas() {
      glitterCanvas.width = casePreview.clientWidth;
      glitterCanvas.height = casePreview.clientHeight;
    }

    function setColor(color, el) {
      casePreview.style.backgroundColor = color;
      document.querySelectorAll('.color-btn').forEach(btn => btn.classList.remove('active'));
      el.classList.add('active');
    }

    function toggleGlitter() {
      glitterEnabled = !glitterEnabled;
      glitterToggle.classList.toggle('active');
      glitterCanvas.style.opacity = glitterEnabled ? '1' : '0';
    }

    function createGlitter() {
      particles = [];
      const count = 300;
      for(let i=0; i<count; i++) {
        particles.push({
          x: Math.random() * 220,
          y: Math.random() * 440,
          size: Math.random() * 2 + 1,
          opacity: Math.random(),
          speed: Math.random() * 0.02 + 0.01,
          color: `hsla(${Math.random() * 360}, 100%, 80%, 1)`
        });
      }
    }

    function loop() {
      if(glitterEnabled) {
        ctx.clearRect(0, 0, glitterCanvas.width, glitterCanvas.height);
        particles.forEach(p => {
          p.opacity += p.speed;
          if(p.opacity > 1 || p.opacity < 0) p.speed *= -1;
          
          ctx.fillStyle = p.color.replace('1)', p.opacity + ')');
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fill();
          
          // Shine effect
          if(p.opacity > 0.8) {
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(p.x - p.size*2, p.y);
            ctx.lineTo(p.x + p.size*2, p.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(p.x, p.y - p.size*2);
            ctx.lineTo(p.x, p.y + p.size*2);
            ctx.stroke();
          }
        });
      }
      requestAnimationFrame(loop);
    }

    function saveDesign() {
      const area = document.getElementById('captureArea');
      html2canvas(area, { backgroundColor: null, scale: 2 }).then(canvas => {
        const link = document.createElement('a');
        link.download = 'handyhuelle-design.png';
        link.href = canvas.toDataURL();
        link.click();
        
        const toast = document.getElementById('toast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
      });
    }

    init();
  </script>
</body>
</html>
