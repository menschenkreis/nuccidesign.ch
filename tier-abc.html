<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tier-ABC 🐾 — NucciDesigner</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #fef9f0;
      --card: #ffffff;
      --text: #2d2a32;
      --text-muted: #6b6880;
      --border: #ede8e0;
      --shadow: rgba(0,0,0,0.06);
    }
    [data-theme="dark"] {
      --bg: #1a1a2e;
      --card: #24243e;
      --text: #f0eef5;
      --text-muted: #9a96b0;
      --border: #333050;
      --shadow: rgba(0,0,0,0.2);
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      transition: background 0.4s, color 0.4s;
      min-height: 100vh;
    }

    .bg-shapes {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
    }
    .bg-shapes .shape {
      position: absolute; border-radius: 50%; opacity: 0.08;
      animation: floatShape 20s ease-in-out infinite;
    }
    .bg-shapes .shape:nth-child(1) { width: 400px; height: 400px; background: #ff6b9d; top: -100px; left: -100px; animation-delay: 0s; }
    .bg-shapes .shape:nth-child(2) { width: 300px; height: 300px; background: #c44dff; top: 30%; right: -80px; animation-delay: -5s; }
    .bg-shapes .shape:nth-child(3) { width: 350px; height: 350px; background: #4dc9f6; bottom: -100px; left: 30%; animation-delay: -10s; }
    .bg-shapes .shape:nth-child(4) { width: 250px; height: 250px; background: #f7c948; top: 60%; left: -60px; animation-delay: -15s; }
    @keyframes floatShape {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-40px) scale(1.05); }
    }

    .wrapper { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; padding: 0 20px; }

    /* Nav */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg); border-bottom: 1px solid var(--border);
      padding: 12px 0; transition: background 0.4s, border-color 0.4s;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    }
    nav .wrapper { display: flex; align-items: center; justify-content: space-between; }
    .back-link {
      color: var(--text-muted); text-decoration: none; font-size: 0.85rem; font-weight: 600;
      display: flex; align-items: center; gap: 6px; transition: color 0.2s;
    }
    .back-link:hover { color: var(--text); }
    .nav-title { font-weight: 800; font-size: 1rem; letter-spacing: -0.02em; }
    .theme-btn {
      background: none; border: 1px solid var(--border); border-radius: 10px;
      width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text-muted); transition: all 0.2s; padding: 0;
    }
    .theme-btn:hover { border-color: #c44dff; color: #c44dff; }
    .icon-moon { display: none; }
    [data-theme="light"] .icon-sun { display: none; }
    [data-theme="light"] .icon-moon { display: block; }

    /* Hero */
    .hero { text-align: center; padding: 48px 0 24px; }
    .hero-emoji { font-size: 3.5rem; margin-bottom: 12px; animation: bounce 2s ease-in-out infinite; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    .hero h1 { font-size: clamp(2rem, 6vw, 2.8rem); font-weight: 900; letter-spacing: -0.04em; margin-bottom: 8px; }
    .hero h1 .rainbow {
      background: linear-gradient(135deg, #ff6b9d, #c44dff, #4dc9f6, #4dff88, #f7c948);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .hero p { color: var(--text-muted); font-size: 0.95rem; font-weight: 600; }

    /* Filter */
    .filter-bar {
      display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
      padding: 16px 0 8px; position: sticky; top: 63px; z-index: 50;
      background: var(--bg); transition: background 0.4s;
    }
    .filter-btn {
      padding: 6px 14px; border-radius: 100px; border: 1px solid var(--border);
      background: var(--card); color: var(--text-muted); font-size: 0.78rem; font-weight: 700;
      font-family: 'Nunito', sans-serif; cursor: pointer; transition: all 0.2s;
    }
    .filter-btn.active { background: linear-gradient(135deg, #c44dff, #ff6b9d); color: white; border-color: transparent; }
    .filter-btn:hover:not(.active) { border-color: #c44dff; color: #c44dff; }

    /* ABC Grid */
    .abc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 14px;
      padding: 20px 0 60px;
    }
    .abc-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 18px;
      padding: 20px 16px; text-align: center; cursor: pointer;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s;
      position: relative; overflow: hidden;
    }
    .abc-card:hover { transform: translateY(-6px) scale(1.03); box-shadow: 0 12px 40px var(--shadow); }
    .abc-card:active { transform: scale(0.97); }
    .abc-card .letter {
      position: absolute; top: 8px; left: 12px; font-size: 0.7rem; font-weight: 900;
      color: var(--text-muted); opacity: 0.4;
    }
    .abc-card .emoji { font-size: 2.8rem; margin-bottom: 8px; display: block; line-height: 1.2; }
    .abc-card .animal-name { font-weight: 800; font-size: 0.95rem; margin-bottom: 4px; letter-spacing: -0.01em; }
    .abc-card .fun-fact {
      font-size: 0.72rem; color: var(--text-muted); line-height: 1.5; font-weight: 600;
      max-height: 0; overflow: hidden; transition: max-height 0.4s ease, margin 0.4s, opacity 0.3s;
      opacity: 0; margin-top: 0;
    }
    .abc-card.expanded .fun-fact { max-height: 120px; margin-top: 8px; opacity: 1; }

    .abc-card .tap-hint {
      font-size: 0.65rem; color: var(--text-muted); opacity: 0.5; margin-top: 6px; font-weight: 600;
      transition: opacity 0.2s;
    }
    .abc-card.expanded .tap-hint { opacity: 0; }

    /* Special letters */
    .abc-card.special { border-color: #c44dff40; }
    .abc-card.special .letter { color: #c44dff; opacity: 0.7; }

    /* Audio */
    .sound-btn {
      position: absolute; top: 8px; right: 10px; background: none; border: none;
      font-size: 1rem; cursor: pointer; opacity: 0.4; transition: opacity 0.2s; padding: 0;
    }
    .abc-card:hover .sound-btn { opacity: 0.8; }
    .sound-btn:active { opacity: 1; transform: scale(1.2); }

    /* Counter */
    .counter {
      text-align: center; padding: 0 0 8px; font-size: 0.8rem; color: var(--text-muted); font-weight: 700;
    }
    .counter span { color: #c44dff; }

    @media (max-width: 400px) {
      .abc-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .abc-card { padding: 16px 12px; }
      .abc-card .emoji { font-size: 2.2rem; }
    }
  </style>
</head>

  <script>
    // Theme
    function setTheme(t) { document.documentElement.setAttribute('data-theme', t); localStorage.setItem('theme', t); }
    const st = localStorage.getItem('theme');
    if (st) setTheme(st);
    else if (window.matchMedia('(prefers-color-scheme: dark)').matches) setTheme('dark');
    function toggleTheme() { setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }

    // Audio
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playNote(freq, dur = 0.3) {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = 'triangle'; o.frequency.value = freq;
      g.gain.setValueAtTime(0.15, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(); o.stop(audioCtx.currentTime + dur);
    }
    // Helper: noise buffer
    function noiseBuf(dur, type = 'white') {
      const len = audioCtx.sampleRate * dur;
      const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
      if (type === 'pink') { let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0; for(let i=0;i<len;i++){const w=Math.random()*2-1;b0=0.99886*b0+w*0.0555179;b1=0.99332*b1+w*0.0750759;b2=0.96900*b2+w*0.1538520;b3=0.86650*b3+w*0.3104856;b4=0.55000*b4+w*0.5329522;b5=-0.7616*b5-w*0.0168980;d[i]=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11;b6=w*0.115926;} }
      return buf;
    }
    function playBuf(buf, vol = 0.3, filter = null, filterFreq = 2000, filterQ = 1) {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const src = audioCtx.createBufferSource(); src.buffer = buf;
      const g = audioCtx.createGain(); g.gain.value = vol;
      if (filter) { const f = audioCtx.createBiquadFilter(); f.type = filter; f.frequency.value = filterFreq; f.Q.value = filterQ; src.connect(f); f.connect(g); g.connect(audioCtx.destination); }
      else { src.connect(g); g.connect(audioCtx.destination); }
      src.start();
    }
    function playOsc(type, freq, dur, vol = 0.15, freqEnd = null) {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = type; o.frequency.setValueAtTime(freq, audioCtx.currentTime);
      if (freqEnd) o.frequency.exponentialRampToValueAtTime(freqEnd, audioCtx.currentTime + dur);
      g.gain.setValueAtTime(vol, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
      o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + dur);
    }

    function playAnimalSound(letter) {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const t = audioCtx.currentTime;
      switch(letter) {
        case 'A': // Affe — screech
          playOsc('sawtooth', 800, 0.3, 0.12, 2200);
          setTimeout(() => playOsc('sawtooth', 900, 0.2, 0.1, 2000), 150);
          break;
        case 'B': // Bär — low growl
          playBuf(noiseBuf(0.6, 'pink'), 0.4, 'lowpass', 200, 2);
          playOsc('sawtooth', 80, 0.5, 0.2, 50);
          break;
        case 'C': // Chamäleon — tongue snap
          playBuf(noiseBuf(0.05), 0.5, 'highpass', 4000);
          break;
        case 'D': // Delfin — click/whistle
          for (let i = 0; i < 3; i++) setTimeout(() => playBuf(noiseBuf(0.03), 0.3, 'bandpass', 8000, 5), i * 80);
          setTimeout(() => playOsc('sine', 1200, 0.3, 0.1, 1800), 250);
          break;
        case 'E': // Elefant — trumpet
          playOsc('sawtooth', 200, 0.6, 0.15, 400);
          playBuf(noiseBuf(0.5, 'pink'), 0.2, 'bandpass', 500, 3);
          break;
        case 'F': // Fuchs — yap
          playOsc('square', 600, 0.15, 0.08, 1200);
          setTimeout(() => playOsc('square', 700, 0.12, 0.06, 1400), 200);
          break;
        case 'G': // Giraffe — hum
          playOsc('sine', 120, 0.8, 0.12);
          playOsc('sine', 125, 0.8, 0.1);
          break;
        case 'H': // Hai — underwater rumble
          playBuf(noiseBuf(0.5, 'pink'), 0.3, 'lowpass', 150, 3);
          break;
        case 'I': // Igel — snuffle
          playBuf(noiseBuf(0.2), 0.15, 'bandpass', 2000, 5);
          setTimeout(() => playBuf(noiseBuf(0.15), 0.12, 'bandpass', 2000, 5), 250);
          break;
        case 'J': // Jaguar — roar
          playOsc('sawtooth', 150, 0.5, 0.15, 300);
          playBuf(noiseBuf(0.4, 'pink'), 0.25, 'lowpass', 400, 2);
          break;
        case 'K': // Koala — grunt
          playOsc('sawtooth', 200, 0.2, 0.1, 100);
          setTimeout(() => playOsc('sawtooth', 180, 0.15, 0.08, 90), 250);
          break;
        case 'L': // Löiw — roar
          playOsc('sawtooth', 120, 0.8, 0.2, 250);
          playBuf(noiseBuf(0.6, 'pink'), 0.3, 'lowpass', 300, 2);
          setTimeout(() => playOsc('sawtooth', 100, 0.5, 0.15, 200), 400);
          break;
        case 'M': // Mauwurf — scratch
          playBuf(noiseBuf(0.1), 0.1, 'highpass', 5000);
          setTimeout(() => playBuf(noiseBuf(0.08), 0.08, 'highpass', 5000), 150);
          setTimeout(() => playBuf(noiseBuf(0.06), 0.06, 'highpass', 5000), 300);
          break;
        case 'N': // Nashorn — snort
          playBuf(noiseBuf(0.3, 'pink'), 0.35, 'bandpass', 600, 3);
          playOsc('sine', 100, 0.3, 0.15, 60);
          break;
        case 'O': // Otter — chirp
          playOsc('sine', 1500, 0.1, 0.1, 2000);
          setTimeout(() => playOsc('sine', 1600, 0.1, 0.08, 2200), 120);
          setTimeout(() => playOsc('sine', 1700, 0.08, 0.06, 2400), 240);
          break;
        case 'P': // Pinguin — bray
          playOsc('sawtooth', 400, 0.15, 0.1, 800);
          setTimeout(() => playOsc('sawtooth', 500, 0.12, 0.08, 1000), 180);
          break;
        case 'Q': // Qualle — blip
          playOsc('sine', 300, 0.4, 0.08, 600);
          playOsc('sine', 305, 0.4, 0.06, 610);
          break;
        case 'R': // Rentier — grunt
          playOsc('sawtooth', 180, 0.15, 0.1, 120);
          break;
        case 'S': // Schmetterling — flutter
          for (let i = 0; i < 6; i++) setTimeout(() => playBuf(noiseBuf(0.03), 0.04, 'highpass', 8000), i * 60);
          break;
        case 'T': // Tiger — growl
          playOsc('sawtooth', 100, 0.6, 0.18, 200);
          playBuf(noiseBuf(0.5, 'pink'), 0.2, 'lowpass', 250, 2);
          break;
        case 'U': // Uhu — hoot
          playOsc('sine', 350, 0.3, 0.12, 300);
          setTimeout(() => playOsc('sine', 300, 0.4, 0.1, 280), 350);
          break;
        case 'V': // Viper — hiss
          playBuf(noiseBuf(0.5), 0.2, 'bandpass', 5000, 8);
          playBuf(noiseBuf(0.5), 0.15, 'highpass', 6000);
          break;
        case 'W': // Wal — deep moan
          playOsc('sine', 60, 1.2, 0.2, 40);
          playOsc('sine', 62, 1.2, 0.15, 42);
          break;
        case 'X': // X-Ray Fisch — bubble
          for (let i = 0; i < 4; i++) setTimeout(() => playOsc('sine', 400 + i * 200, 0.1, 0.08, 600 + i * 200), i * 100);
          break;
        case 'Y': // Yak — grunt
          playOsc('sawtooth', 150, 0.3, 0.15, 80);
          playBuf(noiseBuf(0.3, 'pink'), 0.2, 'lowpass', 300, 3);
          break;
        case 'Z': // Zebra — bray
          playOsc('sawtooth', 500, 0.1, 0.1, 900);
          setTimeout(() => playOsc('square', 300, 0.3, 0.08, 600), 120);
          break;
        case 'Ä': // Äskulapnatter — hiss (softer)
          playBuf(noiseBuf(0.3), 0.12, 'bandpass', 4000, 6);
          break;
        case 'Ö': // Ölkönig — click
          playBuf(noiseBuf(0.02), 0.3, 'bandpass', 10000, 10);
          setTimeout(() => playBuf(noiseBuf(0.02), 0.25, 'bandpass', 10000, 10), 60);
          break;
        case 'Ü': // Waschbär — chitter
          for (let i = 0; i < 5; i++) setTimeout(() => playOsc('square', 800 + i * 100, 0.06, 0.06, 1000 + i * 100), i * 70);
          break;
        default:
          playOsc('triangle', 440, 0.2, 0.1);
      }
    }

    // Animals data
    const animals = [
      { letter: 'A', name: 'Affe', emoji: '🐒', fact: 'Affe chömed wie Mänsche läche! Si chömed au Werkzüg bruuche.', special: false },
      { letter: 'B', name: 'Bär', emoji: '🐻', fact: 'Bäre schlööfed im Winter bis zu 7 Monet lang!', special: false },

      { letter: 'E', name: 'Elefant', emoji: '🐘', fact: 'En Elefant cha sich 70 Joor lang erinnere! Das isch wie en Supercomputer.', special: false },
      { letter: 'F', name: 'Fuchs', emoji: '🦊', fact: 'En Fuchs cha einzeli Laüt ghöre — sogar en Mauwurf under dr Erde!', special: false },
      { letter: 'G', name: 'Giraffe', emoji: '🦒', fact: 'E Giraffe het es blau-schwarze Züngli wo 50 cm lang isch!', special: false },
      { letter: 'H', name: 'Hai', emoji: '🦈', fact: 'Hai exischtiert scho sit 400 Millione Joor — älter as d Dinosaurier!', special: false },
      { letter: 'I', name: 'Igel', emoji: '🦔', fact: 'En Igel het öppe 5000 Stachel! Wenn er Angst het, rollt er sich zämme.', special: false },
      { letter: 'J', name: 'Jaguar', emoji: '🐆', fact: 'De Jaguar isch einzig Grosschatz wo gelegentlich in Wasser jagt!', special: false },
      { letter: 'K', name: 'Koala', emoji: '🐨', fact: 'Koalas schlööfed 22 Stund am Tag! Si essed nume Eukalyptus.', special: false },
      { letter: 'L', name: 'Löiw', emoji: '🦁', fact: 'E Löiwefau brüllet bis zu 8 km wyt! Au d Männli brülled.', special: false },
      { letter: 'M', name: 'Mauwurf', emoji: '🐹', fact: 'En Mauwurf grabt bis zu 90 Meter Tunäll pro Tag!', special: false },

      { letter: 'X', name: 'X-Ray Fisch', emoji: '🐟', fact: 'De X-Ray Tetra isch durchsichtig! Me cha syni Chnoche gseh.', special: true },
      { letter: 'Y', name: 'Yak', emoji: '🐃', fact: 'S Yak läbt i de Bärge vo Tibet bi -40°C! Syn länge Hoor schützt en.', special: true },
      { letter: 'Z', name: 'Zebra', emoji: '🦓', fact: 'Jedes Zebra hät anderi Streife! Au zwüsche Zebra ghöre sich unterscheide.', special: false },
      { letter: 'Ä', name: 'Äskulapnatter', emoji: '🐍', fact: 'D Äskulapnatter isch s Symbol vo de Ärz! Si isch ungiftig und sehr flink.', special: true },
      { letter: 'Ö', name: 'Ölkönig', emoji: '🦇', fact: 'De Ölkönig isch en Nachtvogel us Südamerika. Syn Chüele chönne im Dunkle navigiere!', special: true },
      { letter: 'Ü', name: 'Übeltäter', emoji: '🦝', fact: 'Dr Waschbär heisst uff Änglisch «raccoon» und uff Düütsch «Waschbär». Für Ü gits kei echts Tier — aber er escht e luusige Übeltäter!', special: true },
    ];

    // Build cards
    const grid = document.getElementById('abcGrid');
    animals.forEach(a => {
      const card = document.createElement('div');
      card.className = 'abc-card' + (a.special ? ' special' : '');
      card.dataset.letter = a.letter;
      card.dataset.special = a.special ? 'special' : 'normal';
      card.innerHTML = `
        <span class="letter">${a.letter}</span>
        <button class="sound-btn" title="Ton abspiele">🔊</button>
        <span class="emoji">${a.emoji}</span>
        <div class="animal-name">${a.name}</div>
        <div class="fun-fact">${a.fact}</div>
        <div class="tap-hint">Tippe!</div>
      `;
      // Toggle fact
      card.addEventListener('click', e => {
        if (e.target.closest('.sound-btn')) return;
        card.classList.toggle('expanded');
      });
      // Sound
      card.querySelector('.sound-btn').addEventListener('click', e => {
        e.stopPropagation();
        playAnimalSound(a.letter);
      });
      grid.appendChild(card);
    });

    // Filter
    const filterBtns = document.querySelectorAll('.filter-btn');
    const counter = document.getElementById('countShown');
    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filter = btn.dataset.filter;
        let count = 0;
        document.querySelectorAll('.abc-card').forEach(card => {
          if (filter === 'all') { card.style.display = ''; count++; }
          else if (filter === card.dataset.special) { card.style.display = ''; count++; }
          else { card.style.display = 'none'; card.classList.remove('expanded'); }
        });
        counter.textContent = count;
      });
    });
  </script>
</body>
</html>
