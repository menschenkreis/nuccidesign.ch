function gen(txt){
  var t=txt.toLowerCase().replace(/[!?.,;:'"]/g,'').trim();
  var parts=[];
  var h=new Date().getHours();
  if(mc%3===0){
    if(h>=22)parts.push(rp(['Es isch aber spät!! 😤','Gang ins Bett!! 🛏️','Was machsch no wach?? 😴']));
    else if(h<7)parts.push(rp(['Uff, bisch early wach! 🌅','Hesch überhaupt gschlofe?? 😅','Das isch aber z früeh!']));
  }
  var matched=[];
  var keys=Object.keys(R);
  for(var i=0;i<keys.length;i++){
    var k=keys[i],d=R[k],tr=d.t;
    for(var j=0;j<tr.length;j++){
      if(t.indexOf(tr[j])!==-1){matched.push(k);break}
    }
  }
  if(matched.length>0){
    var data=R[matched[0]];
    parts.push(rp(data.r));
    if(matched.length>1&&Math.random()>0.5){
      parts.push(rp(R[matched[matched.length-1]].r));
    }
  }
  if(parts.length===0){
    parts.push(rp([
      'Hm, interesting! 🤔 Erzähl mer meh!',
      'Ja wo, und wieso sagsch mer da? 😊',
      'Ach Liebling, ich weiss nöd genau was du meinsch, aber ich gseh mer das mit! 🤗',
      'Das isch guet! 👍 Aber vergiss nöd: gähn und schloofe!',
      'Mami verstoot das nöd ganz, aber solangs di glücklich macht! 😄',
      'Hmm! 🤨 Und was willsch du jetzt genau?',
      'Ja ja, die junge Lüt hüt! 😅 Zmeine Zite isch das anders gsi!',
      'Du chasch mer immer schrybe, wänn du wittsch! Ich bi immer do! ❤️',
    ]));
  }
  if(Math.random()>0.7&&mc>2){
    parts.push(rp([
      'Übrigens: Hesch scho Wasser trunke? 💧',
      'D Grossmuetter grüesst au! 👵',
      'Soll i dr es Paket schicke? 📦',
      'De Papa fragt: Bisch am Wuchenend da? 🏠',
      'Ich ha am Sonntig es Guetz gmacht! 🥧 Wänn chunsch du?',
      'Ich ha d Photos vo dir aagluegt! So gross bisch wordle! 😭❤️',
    ]));
  }
  return parts.join(' ');
}

function sm(){
  var txt=inp.value.trim();

  inp.value='';
  am(txt,'ich');
  mc++;
  var delay=600+Math.random()*1400+txt.length*15;
  at();
  setTimeout(function(){rt();am(gen(txt),'mami')},delay);
}

function se(em){
  am(em,'ich');mc++;at();
  setTimeout(function(){rt();am(rp(ER[em]||['🤗','😊','❤️']),'mami')},800+Math.random()*800);
}
