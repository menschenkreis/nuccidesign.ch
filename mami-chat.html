// ── Generate response ──
function gen(txt){
  var t=txt.toLowerCase().replace(/[!?.,;:'"\/()]/g,'').trim();

  // Time nag
  if(mc%3===0){

    else if(h>=11&&h<=13)parts.push(rp(['Hesch scho Zmittag gha? 🍽️','Zmittag isch wichtig! 🕐','Nöd vergässe z ässe!']));
  }

  // Match topics
  var matched=[];
  var keys=Object.keys(R);
  for(var i=0;i<keys.length;i++){
    var k=keys[i],d=R[k],tr=d.t;
    for(var j=0;j<tr.length;j++){
      if(t.indexOf(tr[j])!==-1){matched.push(k);break}
    }
  }

  if(matched.length>0){
    var data=R[matched[0]];
    parts.push(rp(data.r,matched[0]));
    // Second topic
    if(matched.length>1&&Math.random()>0.4){
      parts.push(rp(R[matched[matched.length-1]].r,matched[matched.length-1]));
    }
    // Update last topic
    lastTopic=matched[0];
  }

  // Follow-up from last conversation
  if(matched.length===0&&mc>1&&Math.random()>0.6&&followUps[lastTopic]){
    parts.push(rp(followUps[lastTopic],'fu_'+lastTopic));
  }

  // Fallback
  if(parts.length===0){
    parts.push(rp([
      'Hm, interesting! 🤔 Erzähl mer meh!',
      'Ja wo, und wieso sagsch mer da? 😊',
      'Ach Liebling, ich weiss nöd genau was du meinsch, aber ich gseh mer das mit! 🤗',
      'Das isch guet! 👍 Aber vergiss nöd: gähn und schloofe!',
      'Mami verstoot das nöd ganz, aber solangs di glücklich macht! 😄',
      'Hmm! 🤨 Und was willsch du jetzt genau?',
      'Ja ja, die junge Lüt hüt! 😅 Zmeine Zite isch das anders gsi!',
      'Du chasch mer immer schrybe, wänn du wittsch! Ich bi immer do! ❤️',
      'Mami isch do! 🤗 Was git s?',
      'Und? Was isch passiert? 😊 Erzähl!',
      'Oh ja? 🤔 Das chasch du mir genauer erkläre!',
      'Hm! 🧐 Mami muess da mal nachdänke...',
      'Mami seit immer: Das chunnt scho no! 💪',
      'Du bisch aber hüt gschwätzig! 😄 Ha, ich mein das positively!',
      'Ich ha di lieb, weisst du das? ❤️',
      'Gschribed isch gschribe! Aber red mer mal! 📱',
    ],'fb'));
  }

  // Random motherly add-on (40% chance now)
  if(Math.random()>0.6&&mc>1){
    parts.push(rp(EXTRA,'ex'));
  }

  // Sometimes send 2 separate messages
  if(parts.length>1&&Math.random()>0.5){
    return {multi:parts};
  }
  return {single:parts.join(' ')};
}

// ── Send message ──
function sm(){
  var txt=inp.value.trim();
  if(!txt)return;
  inp.value='';
  am(txt,'ich');
  mc++;
  var delay=500+Math.random()*1200+txt.length*12;
  at();
  setTimeout(function(){
    rt();
    var resp=gen(txt);
    if(resp.multi){
      // Send multiple messages with delays
      var msgs=resp.multi;
      function sendNext(i){
        if(i>=msgs.length)return;
        at();
        setTimeout(function(){
          rt();
          am(msgs[i],'mami');
          sendNext(i+1);
        },600+Math.random()*1000);
      }
      sendNext(0);
    }else{
      am(resp.single,'mami');
    }
  },delay);
}

}
