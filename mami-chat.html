function ts(){var n=new Date();return('0'+n.getHours()).slice(-2)+':'+('0'+n.getMinutes()).slice(-2)}

// ── AI-powered response via proxy ──
function aiResponse(msg){
  return new Promise(function(resolve){
    if(!AI_URL){resolve(null);return}
    fetch(AI_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:msg,history:history.slice(-10)})
    }).then(function(r){
      if(!r.ok)throw new Error('API '+r.status);
      return r.json();
    }).then(function(data){
      if(data.reply)resolve(data.reply);
      else resolve(null);
    }).catch(function(){
      resolve(null);
    });
  });
}

function localResponse(txt){
  var t=txt.toLowerCase().replace(/[!?.,;:'"\/()]/g,'').trim();

  else if(h>=11&&h<=13&&Math.random()>0.5)parts.push(rp(['Hesch scho Zmittag gha? 🍽️','Nöd vergässe z ässe!']));

  // Match topics
  var cats=Object.keys(TMAP);
  for(var i=0;i<cats.length;i++){
    var k=cats[i],tr=TMAP[k];
    for(var j=0;j<tr.length;j++){
      if(t.indexOf(tr[j])!==-1){parts.push(rp(R[k]));break}
    }
    if(parts.length>1)break;
  }

  if(parts.length===0){
    parts.push(rp([
      'Hm, interesting! 🤔 Erzähl mer meh!',
      'Ja wo, und wieso sagsch mer da? 😊',

      'Mami isch do! 🤗 Was git s?',
      'Ich ha di lieb, weisst du das? ❤️',
    ]));
  }

  return parts.join(' ');
}
