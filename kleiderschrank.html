<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Kleiderschrank — NucciDesigner</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#e8e8ed;overflow-x:hidden;min-height:100vh;-webkit-font-smoothing:antialiased;user-select:none}

    .back-link{position:fixed;top:16px;left:16px;z-index:20;color:rgba(255,255,255,.4);text-decoration:none;font-size:.82rem;font-weight:600;padding:8px 14px;border-radius:100px;border:1px solid rgba(255,255,255,.1);background:rgba(0,0,0,.3);backdrop-filter:blur(8px)}
    .back-link:hover{color:white;border-color:rgba(255,255,255,.3)}

    .app{display:flex;flex-direction:column;align-items:center;padding:60px 12px 30px;min-height:100vh}

    .title{font-size:1.5rem;font-weight:900;letter-spacing:-.03em;margin-bottom:4px;text-align:center}
    .subtitle{color:rgba(255,255,255,.4);font-size:.75rem;margin-bottom:20px;text-align:center}

    .workspace{display:flex;gap:16px;width:100%;max-width:700px;justify-content:center;flex-wrap:wrap}

    /* Character */
    .character-panel{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:20px;display:flex;flex-direction:column;align-items:center;min-width:260px;flex:1;max-width:320px}
    .character-name{font-size:.85rem;font-weight:700;margin-bottom:12px;color:rgba(255,255,255,.6)}

    .char-canvas-wrap{position:relative;width:220px;height:340px;background:linear-gradient(180deg,rgba(196,77,255,.06),rgba(96,165,250,.06));border-radius:16px;border:1px solid rgba(255,255,255,.06);overflow:hidden}
    #charCanvas{width:220px;height:340px}

    .skin-row{display:flex;gap:6px;margin-top:12px}
    .skin-btn{width:28px;height:28px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .2s}
    .skin-btn.active{border-color:#c44dff;box-shadow:0 0 10px rgba(196,77,255,.4)}

    /* Wardrobe */
    .wardrobe{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:16px;flex:1;max-width:340px;min-width:260px}
    .cat-label{font-size:.72rem;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.05em;margin:12px 0 8px;display:flex;align-items:center;gap:6px}
    .cat-label:first-child{margin-top:0}
    .cat-label .emoji{font-size:.85rem}
    .remove-btn{margin-left:auto;font-size:.65rem;color:rgba(255,255,255,.3);background:rgba(255,255,255,.06);border:none;padding:3px 10px;border-radius:100px;cursor:pointer}
    .remove-btn:active{background:rgba(239,68,68,.3);color:#ef4444}

    .items-row{display:flex;flex-wrap:wrap;gap:6px}
    .item{width:44px;height:44px;border-radius:12px;border:2px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);display:flex;align-items:center;justify-content:center;font-size:1.3rem;cursor:pointer;transition:all .15s;position:relative}
    .item:active{transform:scale(.9)}
    .item.active{border-color:#c44dff;background:rgba(196,77,255,.1);box-shadow:0 0 12px rgba(196,77,255,.2)}
    .item .label{position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);font-size:.45rem;color:rgba(255,255,255,.3);white-space:nowrap}

    /* Actions */
    .actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;justify-content:center}
    .act-btn{padding:10px 20px;border-radius:100px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:rgba(255,255,255,.7);font-size:.78rem;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;transition:all .15s}
    .act-btn:active{background:rgba(196,77,255,.2);border-color:#c44dff}
    .act-btn.primary{background:linear-gradient(135deg,#c44dff,#60a5fa);border:none;color:white}
    .act-btn.primary:active{opacity:.8}

    /* Screenshot toast */
    .toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(255,255,255,.12);backdrop-filter:blur(16px);padding:10px 22px;border-radius:100px;font-size:.82rem;font-weight:600;color:white;z-index:40;opacity:0;transition:all .3s;pointer-events:none}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
  <a href="index.html" class="back-link">← Zrugg</a>

  <div class="app">
    <div class="title">👗 Kleiderschrank</div>
    <div class="subtitle">Kleide deinen Charakter an — mix & match!</div>

    <div class="workspace">
      <div class="character-panel">
        <div class="character-name">Dein Look</div>
        <div class="char-canvas-wrap"><canvas id="charCanvas" width="440" height="680"></canvas></div>
        <div class="skin-row" id="skinRow"></div>
      </div>

      <div class="wardrobe" id="wardrobe"></div>
    </div>

    <div class="actions">
      <button class="act-btn" onclick="randomOutfit()">🎲 Zufall</button>
      <button class="act-btn" onclick="clearAll()">🗑️ Leeren</button>
      <button class="act-btn primary" onclick="saveOutfit()">📸 Speichern</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const canvas = document.getElementById('charCanvas');
    const ctx = canvas.getContext('2d');
    const CW = 440, CH = 680;

    // Skin colors
    const SKINS = [
      { name: 'Hell', color: '#FDDCB5', shadow: '#E8C49A' },
      { name: 'Mittel', color: '#D4A574', shadow: '#B8895A' },
      { name: 'Dunkel', color: '#8D5524', shadow: '#6B3A15' },
      { name: 'Pale', color: '#FFF0E0', shadow: '#E8D4C0' },
      { name: 'Cool', color: '#C68642', shadow: '#A06A30' },
    ];
    let skinIdx = 0;

    // Clothing categories
    const CLOTHES = {
      hair: {
        label: '🧑 Frisuren', items: [
          { id: 'short', draw: drawShortHair, label: 'Kurz' },
          { id: 'long', draw: drawLongHair, label: 'Lang' },
          { id: 'curly', draw: drawCurlyHair, label: 'Locken' },
          { id: 'bun', draw: drawBunHair, label: 'Dutt' },
          { id: 'mohawk', draw: drawMohawkHair, label: 'Irokese' },
          { id: 'bob', draw: drawBobHair, label: 'Bob' },
        ]
      },
      top: {
        label: '👕 Oberteile', items: [
          { id: 'tshirt', draw: drawTshirt, label: 'T-Shirt' },
          { id: 'hoodie', draw: drawHoodie, label: 'Hoodie' },
          { id: 'suit', draw: drawSuit, label: 'Anzug' },
          { id: 'tank', draw: drawTank, label: 'Tanktop' },
          { id: 'sweater', draw: drawSweater, label: 'Pullover' },
          { id: 'crop', draw: drawCrop, label: 'Croptop' },
        ]
      },
      bottom: {
        label: '👖 Hosen', items: [
          { id: 'jeans', draw: drawJeans, label: 'Jeans' },
          { id: 'skirt', draw: drawSkirt, label: 'Rock' },
          { id: 'shorts', draw: drawShorts, label: 'Shorts' },
          { id: 'wide', draw: drawWidePants, label: 'Wide' },
          { id: 'jogger', draw: drawJogger, label: 'Jogger' },
        ]
      },
      shoes: {
        label: '👟 Schuhe', items: [
          { id: 'sneakers', draw: drawSneakers, label: 'Sneaker' },
          { id: 'boots', draw: drawBoots, label: 'Boots' },
          { id: 'heels', draw: drawHeels, label: 'Heels' },
          { id: 'sandals', draw: drawSandals, label: 'Sandale' },
          { id: 'loafers', draw: drawLoafers, label: 'Loafer' },
        ]
      },
      accessory: {
        label: '✨ Accessoires', items: [
          { id: 'glasses', draw: drawGlasses, label: 'Brille' },
          { id: 'hat', draw: drawHat, label: 'Hut' },
          { id: 'scarf', draw: drawScarf, label: 'Schal' },
          { id: 'earrings', draw: drawEarrings, label: 'Ohrring' },
          { id: 'necklace', draw: drawNecklace, label: 'Kette' },
          { id: 'backpack', draw: drawBackpack, label: 'Rucksack' },
        ]
      }
    };

    // Selected items per category
    let selected = {};

    // ── Body proportions ──
    const B = {
      cx: 220, // center x
      headY: 95, headR: 52,
      neckY: 148, neckH: 18,
      shoulderY: 166, shoulderW: 80,
      torsoBottom: 330,
      waistY: 280, waistW: 58,
      hipY: 330, hipW: 70,
      legGap: 10,
      legTop: 330, legBottom: 560,
      legW: 32,
      footY: 560, footH: 22,
      armTop: 166, armBottom: 320, armW: 22,
      handY: 325, handR: 14,
    };

    function skin() { return SKINS[skinIdx]; }

    // ── Draw body ──
    function drawBody() {
      const s = skin();
      ctx.fillStyle = s.color;

      // Head
      ctx.beginPath();
      ctx.arc(B.cx, B.headY, B.headR, 0, Math.PI * 2);
      ctx.fill();

      // Ears
      ctx.beginPath(); ctx.arc(B.cx - B.headR + 4, B.headY + 5, 10, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(B.cx + B.headR - 4, B.headY + 5, 10, 0, Math.PI * 2); ctx.fill();

      // Eyes
      ctx.fillStyle = '#333';
      ctx.beginPath(); ctx.ellipse(B.cx - 18, B.headY - 5, 6, 7, 0, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(B.cx + 18, B.headY - 5, 6, 7, 0, 0, Math.PI * 2); ctx.fill();
      // Pupils
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(B.cx - 16, B.headY - 4, 3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(B.cx + 20, B.headY - 4, 3, 0, Math.PI * 2); ctx.fill();
      // Eye shine
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(B.cx - 14, B.headY - 6, 1.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(B.cx + 22, B.headY - 6, 1.5, 0, Math.PI * 2); ctx.fill();

      // Eyebrows
      ctx.strokeStyle = '#555'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(B.cx - 28, B.headY - 18); ctx.lineTo(B.cx - 10, B.headY - 20); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(B.cx + 10, B.headY - 20); ctx.lineTo(B.cx + 28, B.headY - 18); ctx.stroke();

      // Nose
      ctx.fillStyle = s.shadow;
      ctx.beginPath(); ctx.moveTo(B.cx, B.headY + 2); ctx.lineTo(B.cx - 5, B.headY + 14); ctx.lineTo(B.cx + 5, B.headY + 14); ctx.fill();

      // Mouth (slight smile)
      ctx.strokeStyle = '#c47a7a'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(B.cx, B.headY + 18, 12, 0.15 * Math.PI, 0.85 * Math.PI); ctx.stroke();

      // Neck
      ctx.fillStyle = s.color;
      ctx.fillRect(B.cx - 14, B.neckY, 28, B.neckH);

      // Torso
      ctx.beginPath();
      ctx.moveTo(B.cx - B.shoulderW / 2, B.shoulderY);
      ctx.lineTo(B.cx + B.shoulderW / 2, B.shoulderY);
      ctx.lineTo(B.cx + B.waistW / 2 + 2, B.waistY);
      ctx.lineTo(B.cx + B.hipW / 2, B.hipY);
      ctx.lineTo(B.cx - B.hipW / 2, B.hipY);
      ctx.lineTo(B.cx - B.waistW / 2 - 2, B.waistY);
      ctx.closePath();
      ctx.fill();

      // Arms
      ctx.fillStyle = s.color;
      // Left arm
      ctx.beginPath();
      ctx.moveTo(B.cx - B.shoulderW / 2, B.shoulderY);
      ctx.lineTo(B.cx - B.shoulderW / 2 - B.armW, B.armBottom);
      ctx.lineTo(B.cx - B.shoulderW / 2 - B.armW + 8, B.armBottom);
      ctx.lineTo(B.cx - B.shoulderW / 2 + 8, B.shoulderY);
      ctx.closePath();
      ctx.fill();
      // Right arm
      ctx.beginPath();
      ctx.moveTo(B.cx + B.shoulderW / 2, B.shoulderY);
      ctx.lineTo(B.cx + B.shoulderW / 2 + B.armW, B.armBottom);
      ctx.lineTo(B.cx + B.shoulderW / 2 + B.armW - 8, B.armBottom);
      ctx.lineTo(B.cx + B.shoulderW / 2 - 8, B.shoulderY);
      ctx.closePath();
      ctx.fill();

      // Hands
      ctx.beginPath(); ctx.arc(B.cx - B.shoulderW / 2 - B.armW + 4, B.handY, B.handR, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(B.cx + B.shoulderW / 2 + B.armW - 4, B.handY, B.handR, 0, Math.PI * 2); ctx.fill();

      // Legs
      const legSpacing = B.legGap;
      // Left leg
      ctx.fillRect(B.cx - legSpacing / 2 - B.legW, B.legTop, B.legW * 2, B.legBottom - B.legTop);
      // Right leg
      ctx.fillRect(B.cx + legSpacing / 2 - B.legW, B.legTop, B.legW * 2, B.legBottom - B.legTop);

      // Feet (base)
      ctx.beginPath();
      ctx.ellipse(B.cx - legSpacing / 2 - B.legW + B.legW, B.footY + B.footH, B.legW + 4, B.footH, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(B.cx + legSpacing / 2 + B.legW - B.legW, B.footY + B.footH, B.legW + 4, B.footH, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // ── CLOTHING DRAW FUNCTIONS ──

    // HAIR
    function drawShortHair() {
      ctx.fillStyle = '#2c1810';
      ctx.beginPath();
      ctx.arc(B.cx, B.headY - 8, B.headR + 6, Math.PI, 0);
      ctx.fill();
      // Sides
      ctx.fillRect(B.cx - B.headR - 2, B.headY - 20, 14, 40);
      ctx.fillRect(B.cx + B.headR - 12, B.headY - 20, 14, 40);
    }
    function drawLongHair() {
      ctx.fillStyle = '#1a0e08';
      ctx.beginPath();
      ctx.arc(B.cx, B.headY - 8, B.headR + 6, Math.PI, 0);
      ctx.fill();
      ctx.fillRect(B.cx - B.headR - 6, B.headY - 20, 18, 200);
      ctx.fillRect(B.cx + B.headR - 12, B.headY - 20, 18, 200);
      // Side hair curves
      ctx.beginPath();
      ctx.moveTo(B.cx - B.headR - 6, B.headY + 160);
      ctx.quadraticCurveTo(B.cx - B.headR + 10, B.headY + 180, B.cx - B.shoulderW / 2, B.shoulderY + 40);
      ctx.lineTo(B.cx - B.headR + 12, B.headY - 10);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(B.cx + B.headR + 6, B.headY + 160);
      ctx.quadraticCurveTo(B.cx + B.headR - 10, B.headY + 180, B.cx + B.shoulderW / 2, B.shoulderY + 40);
      ctx.lineTo(B.cx + B.headR - 12, B.headY - 10);
      ctx.fill();
    }
    function drawCurlyHair() {
      ctx.fillStyle = '#4a2c17';
      for (let i = 0; i < 20; i++) {
        const angle = Math.PI + (i / 19) * Math.PI;
        const r = B.headR + 10 + Math.random() * 8;
        const x = B.cx + Math.cos(angle) * r;
        const y = B.headY - 8 + Math.sin(angle) * r;
        ctx.beginPath(); ctx.arc(x, y, 10 + Math.random() * 6, 0, Math.PI * 2); ctx.fill();
      }
      // Top fill
      ctx.beginPath(); ctx.arc(B.cx, B.headY - 12, B.headR + 4, Math.PI, 0); ctx.fill();
    }
    function drawBunHair() {
      ctx.fillStyle = '#0f0a05';
      ctx.beginPath();
      ctx.arc(B.cx, B.headY - 8, B.headR + 5, Math.PI, 0);
      ctx.fill();
      ctx.fillRect(B.cx - B.headR, B.headY - 15, 12, 30);
      ctx.fillRect(B.cx + B.headR - 12, B.headY - 15, 12, 30);
      // Bun
      ctx.beginPath(); ctx.arc(B.cx, B.headY - B.headR - 15, 24, 0, Math.PI * 2); ctx.fill();
    }
    function drawMohawkHair() {
      ctx.fillStyle = '#c44dff';
      for (let i = 0; i < 8; i++) {
        const x = B.cx - 14 + i * 4;
        const h = 40 + Math.sin(i * 0.8) * 15;
        ctx.beginPath();
        ctx.moveTo(x, B.headY - B.headR + 10);
        ctx.lineTo(x + 3, B.headY - B.headR - h);
        ctx.lineTo(x + 6, B.headY - B.headR + 10);
        ctx.fill();
      }
    }
    function drawBobHair() {
      ctx.fillStyle = '#8B4513';
      ctx.beginPath();
      ctx.arc(B.cx, B.headY - 5, B.headR + 6, Math.PI * 0.8, Math.PI * 0.2);
      ctx.fill();
      // Bob sides
      ctx.fillRect(B.cx - B.headR - 5, B.headY - 10, 16, 60);
      ctx.fillRect(B.cx + B.headR - 11, B.headY - 10, 16, 60);
      // Rounded bottom
      ctx.beginPath(); ctx.arc(B.cx - B.headR + 3, B.headY + 45, 10, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(B.cx + B.headR - 3, B.headY + 45, 10, 0, Math.PI * 2); ctx.fill();
    }

    // TOPS
    function drawTshirt() {
      ctx.fillStyle = '#60a5fa';
      // Body
      ctx.beginPath();
      ctx.moveTo(B.cx - B.shoulderW / 2, B.shoulderY);
      ctx.lineTo(B.cx + B.shoulderW / 2, B.shoulderY);
      ctx.lineTo(B.cx + B.waistW / 2 + 2, B.waistY);
      ctx.lineTo(B.cx - B.waistW / 2 - 2, B.waistY);
      ctx.closePath(); ctx.fill();
      // Sleeves
      ctx.fillRect(B.cx - B.shoulderW / 2 - B.armW + 2, B.shoulderY, B.armW + 4, 60);
      ctx.fillRect(B.cx + B.shoulderW / 2 - 6, B.shoulderY, B.armW + 4, 60);
      // Collar
      ctx.fillStyle = '#3b82f6';
      ctx.beginPath(); ctx.arc(B.cx, B.shoulderY + 4, 18, 0, Math.PI); ctx.fill();
    }
    function drawHoodie() {
      ctx.fillStyle = '#374151';
      ctx.beginPath();
      ctx.moveTo(B.cx - B.shoulderW / 2 - 4, B.shoulderY - 4);
      ctx.lineTo(B.cx + B.shoulderW / 2 + 4, B.shoulderY - 4);
      ctx.lineTo(B.cx + B.hipW / 2 + 4, B.hipY + 10);
      ctx.lineTo(B.cx - B.hipW / 2 - 4, B.hipY + 10);
      ctx.closePath(); ctx.fill();
      // Sleeves
      ctx.fillRect(B.cx - B.shoulderW / 2 - B.armW - 2, B.shoulderY - 2, B.armW + 8, 100);
      ctx.fillRect(B.cx + B.shoulderW / 2 - 6, B.shoulderY - 2, B.armW + 8, 100);
      // Hood
      ctx.fillStyle = '#2d3748';
      ctx.beginPath();
      ctx.moveTo(B.cx - 30, B.shoulderY);
      ctx.quadraticCurveTo(B.cx, B.shoulderY - 35, B.cx + 30, B.shoulderY);
      ctx.stroke();
      // Pocket
      ctx.fillStyle = '#2d3748';
      ctx.fillRect(B.cx - 25, B.waistY - 10, 50, 30);
      // Strings
      ctx.strokeStyle = '#9ca3af'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(B.cx - 8, B.shoulderY + 2); ctx.lineTo(B.cx - 8, B.shoulderY + 30); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(B.cx + 8, B.shoulderY + 2); ctx.lineTo(B.cx + 8, B.shoulderY + 30); ctx.stroke();
    }
    function drawSuit() {
      // Jacket
      ctx.fillStyle = '#1a1a2e';
      ctx.beginPath();
      ctx.moveTo(B.cx - B.shoulderW / 2 - 2, B.shoulderY);
      ctx.lineTo(B.cx + B.shoulderW / 2 + 2, B.shoulderY);
      ctx.lineTo(B.cx + B.hipW / 2 + 6, B.hipY + 15);
      ctx.lineTo(B.cx - B.hipW / 2 - 6, B.hipY + 15);
      ctx.closePath(); ctx.fill();
      // Sleeves
      ctx.fillRect(B.cx - B.shoulderW / 2 - B.armW - 4, B.shoulderY, B.armW + 10, 110);
      ctx.fillRect(B.cx + B.shoulderW / 2 - 6, B.shoulderY, B.armW + 10, 110);
      // Lapels
      ctx.fillStyle = '#252540';
      ctx.beginPath(); ctx.moveTo(B.cx - 5, B.shoulderY + 5); ctx.lineTo(B.cx - 25, B.waistY); ctx.lineTo(B.cx - 5, B.waistY); ctx.fill();
      ctx.beginPath(); ctx.moveTo(B.cx + 5, B.shoulderY + 5); ctx.lineTo(B.cx + 25, B.waistY); ctx.lineTo(B.cx + 5, B.waistY); ctx.fill();
      // Shirt
      ctx.fillStyle = '#f0f0f0';
      ctx.beginPath(); ctx.moveTo(B.cx - 10, B.shoulderY + 5); ctx.lineTo(B.cx + 10, B.shoulderY + 5);
      ctx.lineTo(B.cx + 8, B.hipY); ctx.lineTo(B.cx - 8, B.hipY); ctx.fill();
      // Tie
      ctx.fillStyle = '#c44dff';
      ctx.beginPath(); ctx.moveTo(B.cx, B.shoulderY + 10); ctx.lineTo(B.cx - 8, B.shoulderY + 35);
      ctx.lineTo(B.cx, B.shoulderY + 55); ctx.lineTo(B.cx + 8, B.shoulderY + 35); ctx.fill();
    }
    function drawTank() {
      ctx.fillStyle = '#f472b6';
      ctx.beginPath();
      ctx.moveTo(B.cx - 20, B.shoulderY + 10);
      ctx.lineTo(B.cx + 20, B.shoulderY + 10);
      ctx.lineTo(B.cx + B.waistW / 2 + 2, B.waistY);
      ctx.lineTo(B.cx - B.waistW / 2 - 2, B.waistY);
      ctx.closePath(); ctx.fill();
    }
    function drawSweater() {
      ctx.fillStyle = '#dc2626';
      ctx.beginPath();
      ctx.moveTo(B.cx - B.shoulderW / 2, B.shoulderY);
      ctx.lineTo(B.cx + B.shoulderW / 2, B.shoulderY);
      ctx.lineTo(B.cx + B.hipW / 2 + 2, B.hipY + 5);
      ctx.lineTo(B.cx - B.hipW / 2 - 2, B.hipY + 5);
      ctx.closePath(); ctx.fill();
      // Sleeves
      ctx.fillRect(B.cx - B.shoulderW / 2 - B.armW + 2, B.shoulderY, B.armW + 6, 90);
      ctx.fillRect(B.cx + B.shoulderW / 2 - 6, B.shoulderY, B.armW + 6, 90);
      // Ribbing at bottom
      ctx.fillStyle = '#b91c1c';
      ctx.fillRect(B.cx - B.hipW / 2 - 2, B.hipY - 8, B.hipW + 4, 14);
      // Pattern lines
      ctx.strokeStyle = '#fbbf24'; ctx.lineWidth = 2;
      for (let i = 0; i < 4; i++) {
        const y = B.shoulderY + 40 + i * 30;
        ctx.beginPath(); ctx.moveTo(B.cx - B.shoulderW / 2 + 10, y); ctx.lineTo(B.cx + B.shoulderW / 2 - 10, y); ctx.stroke();
      }
    }
    function drawCrop() {
      ctx.fillStyle = '#34d399';
      ctx.beginPath();
      ctx.moveTo(B.cx - 22, B.shoulderY + 12);
      ctx.lineTo(B.cx + 22, B.shoulderY + 12);
      ctx.lineTo(B.cx + B.waistW / 2 - 5, B.shoulderY + 80);
      ctx.lineTo(B.cx - B.waistW / 2 + 5, B.shoulderY + 80);
      ctx.closePath(); ctx.fill();
    }

    // BOTTOMS
    function drawJeans() {
      ctx.fillStyle = '#1e40af';
      ctx.beginPath();
      ctx.moveTo(B.cx - B.hipW / 2 - 2, B.hipY - 5);
      ctx.lineTo(B.cx + B.hipW / 2 + 2, B.hipY - 5);
      ctx.lineTo(B.cx + B.hipW / 2, B.legBottom - 10);
      ctx.lineTo(B.cx - B.hipW / 2, B.legBottom - 10);
      ctx.closePath(); ctx.fill();
      // Individual legs
      ctx.fillStyle = '#1e3a8a';
      ctx.fillRect(B.cx - B.legGap / 2 - B.legW - 4, B.legTop + 30, B.legW * 2 + 2, B.legBottom - B.legTop - 35);
      ctx.fillRect(B.cx + B.legGap / 2 - B.legW + 2, B.legTop + 30, B.legW * 2 + 2, B.legBottom - B.legTop - 35);
      // Waistband
      ctx.fillStyle = '#1e3a8a';
      ctx.fillRect(B.cx - B.hipW / 2 - 2, B.hipY - 10, B.hipW + 4, 12);
    }
    function drawSkirt() {
      ctx.fillStyle = '#c44dff';
      ctx.beginPath();
      ctx.moveTo(B.cx - B.hipW / 2 - 2, B.hipY - 5);
      ctx.lineTo(B.cx + B.hipW / 2 + 2, B.hipY - 5);
      ctx.lineTo(B.cx + B.hipW / 2 + 25, B.legTop + 80);
      ctx.lineTo(B.cx - B.hipW / 2 - 25, B.legTop + 80);
      ctx.closePath(); ctx.fill();
      // Waistband
      ctx.fillStyle = '#a855f7';
      ctx.fillRect(B.cx - B.hipW / 2 - 2, B.hipY - 10, B.hipW + 4, 12);
    }
    function drawShorts() {
      ctx.fillStyle = '#f59e0b';
      ctx.beginPath();
      ctx.moveTo(B.cx - B.hipW / 2 - 2, B.hipY - 5);
      ctx.lineTo(B.cx + B.hipW / 2 + 2, B.hipY - 5);
      ctx.lineTo(B.cx + B.hipW / 2 + 5, B.legTop + 50);
      ctx.lineTo(B.cx - B.hipW / 2 - 5, B.legTop + 50);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#d97706';
      ctx.fillRect(B.cx - B.legGap / 2 - B.legW - 2, B.legTop + 30, B.legW * 2 + 2, 25);
      ctx.fillRect(B.cx + B.legGap / 2 - B.legW, B.legTop + 30, B.legW * 2 + 2, 25);
      ctx.fillRect(B.cx - B.hipW / 2 - 2, B.hipY - 10, B.hipW + 4, 12);
    }
    function drawWidePants() {
      ctx.fillStyle = '#1a1a2e';
      ctx.beginPath();
      ctx.moveTo(B.cx - B.hipW / 2 - 2, B.hipY - 5);
      ctx.lineTo(B.cx + B.hipW / 2 + 2, B.hipY - 5);
      ctx.lineTo(B.cx + B.hipW / 2 + 15, B.legBottom);
      ctx.lineTo(B.cx - B.hipW / 2 - 15, B.legBottom);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#0f0f1a';
      ctx.fillRect(B.cx - B.legGap / 2 - B.legW - 12, B.legTop + 30, B.legW * 2 + 6, B.legBottom - B.legTop - 35);
      ctx.fillRect(B.cx + B.legGap / 2 - B.legW + 6, B.legTop + 30, B.legW * 2 + 6, B.legBottom - B.legTop - 35);
      ctx.fillRect(B.cx - B.hipW / 2 - 2, B.hipY - 10, B.hipW + 4, 12);
    }
    function drawJogger() {
      ctx.fillStyle = '#374151';
      ctx.fillRect(B.cx - B.hipW / 2 - 2, B.hipY - 10, B.hipW + 4, B.legBottom - B.hipY);
      ctx.fillRect(B.cx - B.legGap / 2 - B.legW - 4, B.legTop + 30, B.legW * 2 + 4, B.legBottom - B.legTop - 35);
      ctx.fillRect(B.cx + B.legGap / 2 - B.legW, B.legTop + 30, B.legW * 2 + 4, B.legBottom - B.legTop - 35);
      // Cuffs
      ctx.fillStyle = '#6b7280';
      ctx.fillRect(B.cx - B.legGap / 2 - B.legW - 4, B.legBottom - 18, B.legW * 2 + 4, 10);
      ctx.fillRect(B.cx + B.legGap / 2 - B.legW, B.legBottom - 18, B.legW * 2 + 4, 10);
      // Stripes
      ctx.strokeStyle = '#fbbf24'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(B.cx - B.hipW / 2 + 8, B.hipY); ctx.lineTo(B.cx - B.hipW / 2 + 8, B.legBottom - 20); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(B.cx + B.hipW / 2 - 8, B.hipY); ctx.lineTo(B.cx + B.hipW / 2 - 8, B.legBottom - 20); ctx.stroke();
    }

    // SHOES
    function drawSneakers() {
      const ly = B.footY + 8, ry = B.footY + 8;
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.ellipse(B.cx - B.legGap / 2, ly, B.legW + 6, B.footH, 0, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(B.cx + B.legGap / 2, ry, B.legW + 6, B.footH, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#c44dff';
      ctx.beginPath(); ctx.ellipse(B.cx - B.legGap / 2 - 5, ly, 10, B.footH - 2, 0, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(B.cx + B.legGap / 2 - 5, ry, 10, B.footH - 2, 0, 0, Math.PI * 2); ctx.fill();
      // Soles
      ctx.fillStyle = '#333';
      ctx.fillRect(B.cx - B.legGap / 2 - B.legW - 4, ly + B.footH - 6, (B.legW + 8) * 2, 6);
      ctx.fillRect(B.cx + B.legGap / 2 - B.legW - 4, ry + B.footH - 6, (B.legW + 8) * 2, 6);
    }
    function drawBoots() {
      const ly = B.footY + 5, ry = B.footY + 5;
      ctx.fillStyle = '#4a2810';
      ctx.fillRect(B.cx - B.legGap / 2 - B.legW - 2, ly - 30, B.legW * 2 + 4, 55);
      ctx.fillRect(B.cx + B.legGap / 2 - B.legW + 2, ly - 30, B.legW * 2 + 4, 55);
      ctx.fillStyle = '#333';
      ctx.fillRect(B.cx - B.legGap / 2 - B.legW - 4, ly + 18, B.legW * 2 + 8, 8);
      ctx.fillRect(B.cx + B.legGap / 2 - B.legW - 4, ly + 18, B.legW * 2 + 8, 8);
    }
    function drawHeels() {
      ctx.fillStyle = '#ef4444';
      ctx.beginPath(); ctx.ellipse(B.cx - B.legGap / 2, B.footY + 10, B.legW + 2, B.footH - 4, 0, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(B.cx + B.legGap / 2, B.footY + 10, B.legW + 2, B.footH - 4, 0, 0, Math.PI * 2); ctx.fill();
      // Heels
      ctx.fillStyle = '#b91c1c';
      ctx.fillRect(B.cx - B.legGap / 2 - 3, B.footY + 10, 8, 22);
      ctx.fillRect(B.cx + B.legGap / 2 - 3, B.footY + 10, 8, 22);
    }
    function drawSandals() {
      ctx.fillStyle = '#92400e';
      ctx.fillRect(B.cx - B.legGap / 2 - B.legW - 2, B.footY + 14, B.legW * 2 + 4, 10);
      ctx.fillRect(B.cx + B.legGap / 2 - B.legW, B.footY + 14, B.legW * 2 + 4, 10);
      ctx.strokeStyle = '#92400e'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(B.cx - B.legGap / 2 - B.legW, B.footY + 10); ctx.lineTo(B.cx - B.legGap / 2 + B.legW, B.footY + 10); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(B.cx + B.legGap / 2 - B.legW, B.footY + 10); ctx.lineTo(B.cx + B.legGap / 2 + B.legW, B.footY + 10); ctx.stroke();
    }
    function drawLoafers() {
      ctx.fillStyle = '#1a1a2e';
      ctx.beginPath(); ctx.ellipse(B.cx - B.legGap / 2, B.footY + 12, B.legW + 5, B.footH - 2, 0, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(B.cx + B.legGap / 2, B.footY + 12, B.legW + 5, B.footH - 2, 0, 0, Math.PI * 2); ctx.fill();
      // Detail
      ctx.fillStyle = '#c44dff';
      ctx.beginPath(); ctx.arc(B.cx - B.legGap / 2, B.footY + 8, 5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(B.cx + B.legGap / 2, B.footY + 8, 5, 0, Math.PI * 2); ctx.fill();
    }

    // ACCESSORIES
    function drawGlasses() {
      ctx.strokeStyle = '#333'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(B.cx - 18, B.headY - 4, 16, 0, Math.PI * 2); ctx.stroke();
      ctx.beginPath(); ctx.arc(B.cx + 18, B.headY - 4, 16, 0, Math.PI * 2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(B.cx - 2, B.headY - 4); ctx.lineTo(B.cx + 2, B.headY - 4); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(B.cx - 34, B.headY - 6); ctx.lineTo(B.cx - B.headR, B.headY); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(B.cx + 34, B.headY - 6); ctx.lineTo(B.cx + B.headR, B.headY); ctx.stroke();
    }
    function drawHat() {
      ctx.fillStyle = '#1a1a2e';
      ctx.beginPath();
      ctx.ellipse(B.cx, B.headY - B.headR + 10, B.headR + 30, 10, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillRect(B.cx - B.headR - 5, B.headY - B.headR - 30, B.headR * 2 + 10, 40);
      ctx.beginPath();
      ctx.ellipse(B.cx, B.headY - B.headR - 28, B.headR + 5, 16, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    function drawScarf() {
      ctx.fillStyle = '#ef4444';
      ctx.beginPath();
      ctx.arc(B.cx, B.neckY + 5, 28, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillRect(B.cx - 12, B.neckY + 20, 24, 60);
      // Fringe
      ctx.strokeStyle = '#dc2626'; ctx.lineWidth = 2;
      for (let i = 0; i < 5; i++) {
        ctx.beginPath(); ctx.moveTo(B.cx - 12 + i * 6, B.neckY + 80); ctx.lineTo(B.cx - 12 + i * 6, B.neckY + 92); ctx.stroke();
      }
    }
    function drawEarrings() {
      ctx.fillStyle = '#fbbf24';
      ctx.beginPath(); ctx.arc(B.cx - B.headR - 2, B.headY + 20, 6, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(B.cx + B.headR + 2, B.headY + 20, 6, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#f59e0b';
      ctx.beginPath(); ctx.arc(B.cx - B.headR - 2, B.headY + 28, 4, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(B.cx + B.headR + 2, B.headY + 28, 4, 0, Math.PI * 2); ctx.fill();
    }
    function drawNecklace() {
      ctx.strokeStyle = '#fbbf24'; ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(B.cx, B.neckY + 15, 30, 0.15 * Math.PI, 0.85 * Math.PI);
      ctx.stroke();
      ctx.fillStyle = '#fbbf24';
      ctx.beginPath(); ctx.arc(B.cx, B.neckY + 42, 6, 0, Math.PI * 2); ctx.fill();
    }
    function drawBackpack() {
      ctx.fillStyle = '#c44dff';
      const bx = B.cx + B.shoulderW / 2 + B.armW - 5;
      ctx.beginPath();
      ctx.moveTo(bx - 20, B.shoulderY + 20);
      ctx.lineTo(bx + 20, B.shoulderY + 20);
      ctx.lineTo(bx + 22, B.hipY - 20);
      ctx.lineTo(bx - 18, B.hipY - 20);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#a855f7';
      ctx.fillRect(bx - 14, B.shoulderY + 30, 28, 25);
      // Straps
      ctx.strokeStyle = '#a855f7'; ctx.lineWidth = 4;
      ctx.beginPath(); ctx.moveTo(bx - 15, B.shoulderY + 20); ctx.lineTo(bx - 25, B.shoulderY); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(bx + 15, B.shoulderY + 20); ctx.lineTo(bx + 25, B.shoulderY); ctx.stroke();
    }

    // ── Render ──
    function render() {
      ctx.clearRect(0, 0, CW, CH);

      // Background pattern
      ctx.fillStyle = 'rgba(255,255,255,.02)';
      for (let y = 0; y < CH; y += 20) for (let x = 0; x < CW; x += 20) {
        if ((Math.floor(x/20) + Math.floor(y/20)) % 2 === 0) ctx.fillRect(x, y, 20, 20);
      }

      // Draw order: body → bottom → shoes → top → hair → accessory
      drawBody();

      // Bottom
      if (selected.bottom) {
        const item = CLOTHES.bottom.items.find(i => i.id === selected.bottom);
        if (item) item.draw();
      }

      // Shoes
      if (selected.shoes) {
        const item = CLOTHES.shoes.items.find(i => i.id === selected.shoes);
        if (item) item.draw();
      }

      // Top
      if (selected.top) {
        const item = CLOTHES.top.items.find(i => i.id === selected.top);
        if (item) item.draw();
      }

      // Hair
      if (selected.hair) {
        const item = CLOTHES.hair.items.find(i => i.id === selected.hair);
        if (item) item.draw();
      }

      // Accessories
      if (selected.accessory) {
        const item = CLOTHES.accessory.items.find(i => i.id === selected.accessory);
        if (item) item.draw();
      }
    }

    // ── Build UI ──
    function buildWardrobe() {
      const wardrobe = document.getElementById('wardrobe');
      wardrobe.innerHTML = '';

      Object.entries(CLOTHES).forEach(([cat, data]) => {
        const label = document.createElement('div');
        label.className = 'cat-label';
        label.innerHTML = `<span class="emoji">${data.label.split(' ')[0]}</span> ${data.label.split(' ').slice(1).join(' ')}`;
        if (selected[cat]) {
          const removeBtn = document.createElement('button');
          removeBtn.className = 'remove-btn';
          removeBtn.textContent = '✕';
          removeBtn.onclick = () => { delete selected[cat]; buildWardrobe(); render(); };
          label.appendChild(removeBtn);
        }
        wardrobe.appendChild(label);

        const row = document.createElement('div');
        row.className = 'items-row';

        data.items.forEach(item => {
          const el = document.createElement('div');
          el.className = 'item' + (selected[cat] === item.id ? ' active' : '');
          el.textContent = getItemEmoji(cat, item.id);
          el.title = item.label;
          el.onclick = () => {
            selected[cat] = selected[cat] === item.id ? null : item.id;
            buildWardrobe();
            render();
          };
          row.appendChild(el);
        });

        wardrobe.appendChild(row);
      });
    }

    function getItemEmoji(cat, id) {
      const map = {
        hair: { short:'👤', long:'👩', curly:'🧑‍🦱', bun:'👩‍🦰', mohawk:'🦅', bob:'💇' },
        top: { tshirt:'👕', hoodie:'🧥', suit:'🤵', tank:'🎽', sweater:'🧶', crop:'✂️' },
        bottom: { jeans:'👖', skirt:'👗', shorts:'🩳', wide:'🦵', jogger:'🏃' },
        shoes: { sneakers:'👟', boots:'🥾', heels:'👠', sandals:'🩴', loafers:'👞' },
        accessory: { glasses:'👓', hat:'🎩', scarf:'🧣', earrings:'💎', necklace:'📿', backpack:'🎒' },
      };
      return map[cat]?.[id] || '?';
    }

    // ── Skin selector ──
    function buildSkinRow() {
      const row = document.getElementById('skinRow');
      row.innerHTML = '';
      SKINS.forEach((s, i) => {
        const btn = document.createElement('div');
        btn.className = 'skin-btn' + (i === skinIdx ? ' active' : '');
        btn.style.background = s.color;
        btn.title = s.name;
        btn.onclick = () => { skinIdx = i; buildSkinRow(); render(); };
        row.appendChild(btn);
      });
    }

    // ── Actions ──
    function randomOutfit() {
      selected = {};
      Object.entries(CLOTHES).forEach(([cat, data]) => {
        const items = data.items;
        selected[cat] = items[Math.floor(Math.random() * items.length)].id;
      });
      buildWardrobe();
      render();
      showToast('🎲 Zufalls-Look!');
    }

    function clearAll() {
      selected = {};
      buildWardrobe();
      render();
      showToast('🗑️ Alles entfernt');
    }

    function saveOutfit() {
      const link = document.createElement('a');
      link.download = 'mein-look.png';
      link.href = canvas.toDataURL();
      link.click();
      showToast('📸 Look gespeichert!');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 1800);
    }

    // ── Init ──
    buildSkinRow();
    buildWardrobe();
    render();
  </script>
</body>
</html>
