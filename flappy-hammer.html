<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Flappy Einhorn — NucciDesigner</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Inter', sans-serif; background: #0a0a0f; color: #e8e8ed;
      overflow: hidden; height: 100vh; height: 100dvh;
      -webkit-font-smoothing: antialiased; touch-action: none; user-select: none;
    }

    canvas { display: block; width: 100%; height: 100%; }

    .overlay {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      transition: opacity 0.4s; padding: 20px;
    }
    .overlay.hidden { opacity: 0; pointer-events: none; }

    .title { font-size: clamp(2rem, 8vw, 3.5rem); font-weight: 900; letter-spacing: -0.04em; text-align: center; margin-bottom: 8px; }
    .subtitle { color: rgba(255,255,255,0.5); font-size: 0.85rem; text-align: center; margin-bottom: 24px; }

    .score-display { font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; color: rgba(255,255,255,0.5); margin-bottom: 8px; }
    .score-display span { color: #c44dff; font-weight: 700; font-size: 1.2rem; }

    .play-btn {
      padding: 16px 48px; border-radius: 100px; border: none;
      background: linear-gradient(135deg, #c44dff, #ff6b9d); color: white;
      font-size: 1rem; font-weight: 800; font-family: 'Inter', sans-serif;
      cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
    }
    .play-btn:hover { transform: scale(1.05); box-shadow: 0 8px 30px rgba(196,77,255,0.4); }
    .play-btn:active { transform: scale(0.95); }

    .diff-row { display: flex; gap: 8px; margin-bottom: 24px; }
    .diff-btn {
      padding: 8px 18px; border-radius: 100px; border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.5); font-size: 0.78rem; font-weight: 700;
      font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.2s;
    }
    .diff-btn:hover { border-color: #c44dff; color: #c44dff; }
    .diff-btn.active { background: #c44dff; color: white; border-color: #c44dff; }

    .instructions { color: rgba(255,255,255,0.4); font-size: 0.72rem; margin-top: 20px; text-align: center; line-height: 1.6; }

    .back-link {
      position: fixed; top: 16px; left: 16px; z-index: 20;
      color: rgba(255,255,255,0.4); text-decoration: none; font-size: 0.82rem; font-weight: 600;
      padding: 8px 14px; border-radius: 100px; border: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.3); backdrop-filter: blur(8px); transition: all 0.2s;
    }
    .back-link:hover { color: white; border-color: rgba(255,255,255,0.3); }

    .hud {
      position: fixed; top: 16px; right: 16px; z-index: 20;
      font-family: 'JetBrains Mono', monospace; font-size: 0.75rem;
      color: rgba(255,255,255,0.5); padding: 6px 14px;
      background: rgba(0,0,0,0.3); border-radius: 100px; backdrop-filter: blur(8px);
    }
    .hud span { color: #c44dff; font-weight: 700; }
  </style>
</head>
<body>
  <a href="index.html" class="back-link">← Zrugg</a>
  <div class="hud" id="hud" style="display:none;">Score: <span id="hudScore">0</span></div>

  <canvas id="game"></canvas>

  <!-- Start -->
  <div class="overlay" id="startScreen">
    <div class="title">🦄 Flappy<br>Einhorn</div>
    <div class="subtitle">S Einhorn bruucht din Hilf zum fliege!</div>
    <div class="score-display">Best: <span id="bestScore">0</span></div>
    <div class="diff-row">
      <button class="diff-btn" data-diff="easy">🟢 Leicht</button>
      <button class="diff-btn active" data-diff="normal">🟡 Normal</button>
      <button class="diff-btn" data-diff="hard">🔴 Schwer</button>
    </div>
    <button class="play-btn" id="playBtn">Los!</button>
    <div class="instructions">Tippe oder klick zum fliege<br>S Einhorn muess d Lücke finde!</div>
  </div>

  <!-- Game Over -->
  <div class="overlay hidden" id="overScreen">
    <div class="title" style="font-size:2rem;">Game Over 💀</div>
    <div class="score-display" style="margin-top:16px;">Score: <span id="finalScore">0</span></div>
    <div class="score-display">Best: <span id="bestScore2">0</span></div>
    <button class="play-btn" id="retryBtn" style="margin-top:24px;">Nöimal!</button>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    // Audio
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function beep(freq, dur, vol = 0.1, type = 'square') {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = type; o.frequency.value = freq;
      g.gain.setValueAtTime(vol, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
      o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + dur);
    }
    function sndFlap() { beep(600, 0.1, 0.06); setTimeout(() => beep(900, 0.08, 0.04), 40); }
    function sndScore() { beep(523, 0.1, 0.08); setTimeout(() => beep(659, 0.1, 0.08), 80); setTimeout(() => beep(784, 0.15, 0.06), 160); }
    function sndHit() { beep(150, 0.3, 0.15, 'sawtooth'); }

    // Resize
    let W, H;
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    // Difficulty presets
    const DIFFS = {
      easy:   { gravity: 0.28, flap: -6,  gap: 200, speed: 2,   interval: 120 },
      normal: { gravity: 0.42, flap: -7.5, gap: 155, speed: 2.5, interval: 100 },
      hard:   { gravity: 0.55, flap: -8.5, gap: 115, speed: 3.5, interval: 80  },
    };
    let diff = 'normal';
    document.querySelectorAll('.diff-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        diff = btn.dataset.diff;
      });
    });

    const PIPE_W = 60;
    let uni, pipes, score, bestScore, frame, gameRunning, gameStarted;
    let particles = [], stars = [];

    bestScore = parseInt(localStorage.getItem('flappyUnicornBest') || '0');
    document.getElementById('bestScore').textContent = bestScore;

    for (let i = 0; i < 60; i++) {
      stars.push({ x: Math.random() * 2000, y: Math.random() * 2000, r: Math.random() * 1.5 + 0.5, a: Math.random() });
    }

    function init() {
      uni = { x: W * 0.3, y: H * 0.45, vy: 0, angle: 0 };
      pipes = []; score = 0; frame = 0; particles = []; gameStarted = false;
    }

    function flap() {
      if (!gameRunning) return;
      if (!gameStarted) gameStarted = true;
      uni.vy = DIFFS[diff].flap;
      uni.angle = -0.4;
      sndFlap();
    }

    function spawnPipe() {
      const d = DIFFS[diff];
      const minTop = 80, maxTop = H - d.gap - 80;
      const topH = Math.random() * (maxTop - minTop) + minTop;
      pipes.push({ x: W + 20, top: topH, scored: false });
    }

    function spawnParticles(x, y, color, count = 5) {
      for (let i = 0; i < count; i++) {
        particles.push({
          x, y, vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6,
          r: Math.random() * 3 + 1, life: 1, color, decay: 0.02 + Math.random() * 0.02
        });
      }
    }

    function drawUnicorn() {
      ctx.save();
      ctx.translate(uni.x, uni.y);
      ctx.rotate(uni.angle);

      // Body
      ctx.fillStyle = '#f0e0ff';
      ctx.beginPath(); ctx.ellipse(0, 0, 16, 12, 0, 0, Math.PI * 2); ctx.fill();

      // Head
      ctx.fillStyle = '#f5eaff';
      ctx.beginPath(); ctx.ellipse(10, -6, 10, 9, 0.3, 0, Math.PI * 2); ctx.fill();

      // Ear
      ctx.fillStyle = '#e8d0ff';
      ctx.beginPath(); ctx.moveTo(14, -14); ctx.lineTo(18, -24); ctx.lineTo(12, -16); ctx.fill();
      ctx.fillStyle = '#ffccee';
      ctx.beginPath(); ctx.moveTo(14, -15); ctx.lineTo(17, -22); ctx.lineTo(13, -16); ctx.fill();

      // Horn
      const hornGrad = ctx.createLinearGradient(16, -20, 20, -38);
      hornGrad.addColorStop(0, '#ffd700'); hornGrad.addColorStop(1, '#ff6b9d');
      ctx.fillStyle = hornGrad;
      ctx.beginPath(); ctx.moveTo(15, -18); ctx.lineTo(20, -38); ctx.lineTo(17, -16); ctx.fill();

      // Eye
      ctx.fillStyle = '#c44dff';
      ctx.beginPath(); ctx.arc(14, -7, 3.5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'white';
      ctx.beginPath(); ctx.arc(15, -8, 1.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(13, -9, 0.8, 0, Math.PI * 2); ctx.fill();

      // Cheek
      ctx.fillStyle = 'rgba(255,150,200,0.3)';
      ctx.beginPath(); ctx.arc(18, -3, 3, 0, Math.PI * 2); ctx.fill();

      // Smile
      ctx.strokeStyle = '#c080e0'; ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.arc(18, -3, 3, 0.2, 1.2); ctx.stroke();

      // Mane (rainbow)
      const maneColors = ['#ff6b6b','#ffa500','#ffd700','#4dff88','#6b9dff','#c44dff'];
      maneColors.forEach((c, i) => {
        ctx.strokeStyle = c; ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(4 + i * 0.5, -8 - i * 2);
        ctx.quadraticCurveTo(-8, -12 - i * 3, -12 - i * 2, -4 + i);
        ctx.stroke();
      });

      // Legs
      ctx.strokeStyle = '#f0e0ff'; ctx.lineWidth = 3; ctx.lineCap = 'round';
      const lk = Math.sin(frame * 0.3) * 3;
      ctx.beginPath(); ctx.moveTo(-6, 10); ctx.lineTo(-8, 22 + lk); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(6, 10); ctx.lineTo(8, 22 - lk); ctx.stroke();

      // Tail (rainbow)
      const tc = ['#c44dff','#6b9dff','#4dff88','#ffd700'];
      tc.forEach((c, i) => {
        ctx.strokeStyle = c; ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-14, -2 + i * 2);
        ctx.quadraticCurveTo(-22, -8 + i * 3 + Math.sin(frame * 0.1 + i) * 4, -28, -4 + i * 4);
        ctx.stroke();
      });

      ctx.restore();

      // Sparkle trail
      if (gameStarted && gameRunning && frame % 3 === 0) {
        spawnParticles(uni.x - 18, uni.y, maneColors[Math.floor(Math.random() * maneColors.length)], 1);
      }
    }

    function drawPipe(pipe) {
      const d = DIFFS[diff];
      const grad1 = ctx.createLinearGradient(pipe.x, 0, pipe.x + PIPE_W, 0);
      grad1.addColorStop(0, '#1a5c3a'); grad1.addColorStop(0.3, '#2d8f5e'); grad1.addColorStop(0.7, '#2d8f5e'); grad1.addColorStop(1, '#1a5c3a');
      ctx.fillStyle = grad1;
      ctx.fillRect(pipe.x, 0, PIPE_W, pipe.top);
      ctx.fillStyle = '#247a4a';
      ctx.fillRect(pipe.x - 4, pipe.top - 20, PIPE_W + 8, 20);
      ctx.fillStyle = '#1a6040';
      ctx.fillRect(pipe.x - 4, pipe.top - 20, PIPE_W + 8, 3);

      const botY = pipe.top + d.gap;
      ctx.fillStyle = grad1;
      ctx.fillRect(pipe.x, botY, PIPE_W, H - botY);
      ctx.fillStyle = '#247a4a';
      ctx.fillRect(pipe.x - 4, botY, PIPE_W + 8, 20);
      ctx.fillStyle = '#1a6040';
      ctx.fillRect(pipe.x - 4, botY, PIPE_W + 8, 3);
    }

    function drawBackground() {
      const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
      skyGrad.addColorStop(0, '#0a0a1a'); skyGrad.addColorStop(0.5, '#0f1028'); skyGrad.addColorStop(1, '#1a0a2e');
      ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, W, H);

      stars.forEach(s => {
        s.a += 0.005;
        const alpha = 0.3 + Math.sin(s.a) * 0.3;
        ctx.fillStyle = `rgba(200,200,255,${alpha})`;
        ctx.beginPath(); ctx.arc(s.x % W, s.y % H, s.r, 0, Math.PI * 2); ctx.fill();
      });

      ctx.fillStyle = '#1a3a2a'; ctx.fillRect(0, H - 40, W, 40);
      ctx.fillStyle = '#2d5a3a'; ctx.fillRect(0, H - 40, W, 4);
    }

    function update() {
      if (!gameStarted || !gameRunning) return;
      const d = DIFFS[diff];
      frame++;

      uni.vy += d.gravity;
      uni.y += uni.vy;
      uni.angle += (0 - uni.angle) * 0.1;

      if (frame % d.interval === 0) spawnPipe();

      pipes.forEach(pipe => {
        pipe.x -= d.speed;
        if (!pipe.scored && pipe.x + PIPE_W < uni.x) {
          pipe.scored = true; score++;
          document.getElementById('hudScore').textContent = score;
          sndScore();
          spawnParticles(uni.x, uni.y, '#c44dff', 8);
        }
      });

      pipes = pipes.filter(p => p.x + PIPE_W > -20);

      const hw = 10, hh = 10;
      if (uni.y + hh > H - 40 || uni.y - hh < 0) { gameOver(); return; }
      for (const pipe of pipes) {
        if (uni.x + hw > pipe.x && uni.x - hw < pipe.x + PIPE_W) {
          if (uni.y - hh < pipe.top || uni.y + hh > pipe.top + d.gap) { gameOver(); return; }
        }
      }
    }

    function draw() {
      drawBackground();
      pipes.forEach(drawPipe);
      drawUnicorn();

      particles.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.life -= p.decay; p.vy += 0.1;
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
      });
      ctx.globalAlpha = 1;
      particles = particles.filter(p => p.life > 0);

      if (gameStarted && gameRunning) {
        ctx.fillStyle = 'rgba(255,255,255,0.12)';
        ctx.font = '900 80px Inter, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(score, W / 2, 120);
      }
    }

    function gameOver() {
      gameRunning = false; sndHit();
      spawnParticles(uni.x, uni.y, '#ff4444', 15);
      spawnParticles(uni.x, uni.y, '#ffaa00', 10);
      if (score > bestScore) { bestScore = score; localStorage.setItem('flappyUnicornBest', bestScore); }
      setTimeout(() => {
        document.getElementById('finalScore').textContent = score;
        document.getElementById('bestScore2').textContent = bestScore;
        document.getElementById('bestScore').textContent = bestScore;
        document.getElementById('overScreen').classList.remove('hidden');
        document.getElementById('hud').style.display = 'none';
      }, 600);
    }

    function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }

    function startGame() {
      init(); gameRunning = true;
      document.getElementById('startScreen').classList.add('hidden');
      document.getElementById('overScreen').classList.add('hidden');
      document.getElementById('hud').style.display = '';
      document.getElementById('hudScore').textContent = '0';
    }

    document.getElementById('playBtn').addEventListener('click', () => { startGame(); flap(); });
    document.getElementById('retryBtn').addEventListener('click', () => { startGame(); flap(); });
    canvas.addEventListener('pointerdown', e => { e.preventDefault(); flap(); });
    document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); flap(); } });

    init();
    gameLoop();
  </script>
</body>
</html>
