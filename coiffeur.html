<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Coiffeur-Simulator — NucciDesigner</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#e8e8ed;overflow:hidden;height:100vh;display:flex;flex-direction:column;user-select:none;touch-action:none}

    .back-link{position:fixed;top:16px;left:16px;z-index:100;color:rgba(255,255,255,.4);text-decoration:none;font-size:.8rem;font-weight:600;padding:8px 14px;border-radius:100px;border:1px solid rgba(255,255,255,.1);background:rgba(0,0,0,.3);backdrop-filter:blur(8px)}

    .ui-top{padding:60px 16px 10px;text-align:center;flex-shrink:0}
    .title{font-size:1.5rem;font-weight:900;letter-spacing:-.03em;margin-bottom:4px}
    .wish-box{background:rgba(196,77,255,.1);border:1px solid rgba(196,77,255,.2);padding:12px 20px;border-radius:16px;margin:10px auto;max-width:320px;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}
    .wish-label{font-size:.65rem;text-transform:uppercase;letter-spacing:.05em;color:rgba(255,255,255,.4);margin-bottom:4px}
    .wish-text{font-size:1rem;font-weight:700;color:#c44dff}

    .game-container{flex:1;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
    canvas{max-width:100%;max-height:100%;cursor:crosshair}

    .toolbar{padding:16px;background:rgba(255,255,255,.04);border-top:1px solid rgba(255,255,255,.06);display:flex;justify-content:center;gap:10px;flex-shrink:0}
    .tool{width:56px;height:56px;border-radius:16px;border:2px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;position:relative}
    .tool.active{border-color:#c44dff;background:rgba(196,77,255,.15);box-shadow:0 0 15px rgba(196,77,255,.3);transform:translateY(-4px)}
    .tool .icon{font-size:1.4rem}
    .tool .label{font-size:.55rem;font-weight:700;margin-top:2px;color:rgba(255,255,255,.4)}
    .tool.active .label{color:#c44dff}

    .finish-btn{background:linear-gradient(135deg,#c44dff,#7c6aef);border:none;color:white;padding:12px 28px;border-radius:100px;font-size:.9rem;font-weight:800;font-family:'Inter',sans-serif;cursor:pointer;box-shadow:0 4px 15px rgba(124,106,239,.4);transition:all .2s;margin-left:10px}
    .finish-btn:active{transform:scale(.92);opacity:.9}

    /* Result Overlay */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(20px);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;padding:30px;text-align:center;visibility:hidden;opacity:0;transition:all .3s}
    .overlay.show{visibility:visible;opacity:1}
    .result-emoji{font-size:4rem;margin-bottom:10px}
    .result-title{font-size:1.8rem;font-weight:900;margin-bottom:8px}
    .result-desc{font-size:.9rem;color:rgba(255,255,255,.6);margin-bottom:24px;max-width:280px}
    .next-btn{padding:14px 40px;border-radius:100px;border:none;background:white;color:black;font-size:.9rem;font-weight:800;cursor:pointer;transition:all .2s}
    .next-btn:active{transform:scale(.95)}

    .stars{display:flex;gap:4px;margin-bottom:15px}
    .star{font-size:1.5rem;color:#fbbf24}
    .star.empty{color:rgba(255,255,255,.1)}
  </style>
</head>
<body>
  <a href="index.html" class="back-link">← Zrugg</a>

  <div class="ui-top">
    <div class="title">✂️ Nucci Coiffeur</div>
    <div class="wish-box">
      <div class="wish-label">De Wunsch vom Kund:</div>
      <div class="wish-text" id="wishText">Lade...</div>
    </div>
  </div>

  <div class="game-container" id="container">
    <canvas id="gameCanvas"></canvas>
  </div>

  <div class="toolbar">
    <div class="tool active" id="tool-scissors" onclick="setTool('scissors')">
      <span class="icon">✂️</span>
      <span class="label">Scheri</span>
    </div>
    <div class="tool" id="tool-trimmer" onclick="setTool('trimmer')">
      <span class="icon">🪒</span>
      <span class="label">Rasierer</span>
    </div>
    <div class="tool" id="tool-tonic" onclick="setTool('tonic')">
      <span class="icon">🧴</span>
      <span class="label">Wuchsmittel</span>
    </div>
    <button class="finish-btn" onclick="finish()">Fertig! ✅</button>
  </div>

  <div class="overlay" id="overlay">
    <div class="result-emoji" id="resEmoji">🤩</div>
    <div class="stars" id="resStars"></div>
    <div class="result-title" id="resTitle">Super gmacht!</div>
    <div class="result-desc" id="resDesc">De Kund isch mega zfriede mit dem neue Look!</div>
    <button class="next-btn" onclick="nextLevel()">Nächste Kund</button>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const wishEl = document.getElementById('wishText');
    const overlay = document.getElementById('overlay');
    
    let CW, CH;
    let strands = [];
    let currentTool = 'scissors';
    let isDrawing = false;
    let lastX, lastY;
    
    const COLORS = ['#2c1810', '#1a0e08', '#4a2c17', '#8B4513', '#c44dff', '#60a5fa', '#f472b6'];
    let hairColor = COLORS[0];

    const WISHES = [
      { name: "Militär-Schnitt", desc: "Überall ganz churz!", check: (s) => s.every(l => l < 30) },
      { name: "Vokuhila", desc: "Vorne churz, hinde lang!", check: (s, a) => s.every((l, i) => (a[i] > 0 && a[i] < Math.PI) ? l < 40 : l > 80) },
      { name: "Boxerschnitt", desc: "Obbe lang, an de Site rasiert!", check: (s, a) => s.every((l, i) => (a[i] < -0.5 && a[i] > -2.5) ? l > 60 : l < 20) },
      { name: "Glatze", desc: "ALLES WEG! Radikal!", check: (s) => s.every(l => l < 10) },
      { name: "Igelschnitt", desc: "Überall mittelchurz!", check: (s) => s.every(l => l > 20 && l < 50) },
      { name: "Irokese", desc: "Nume in de Mitti lang!", check: (s, a) => s.every((l, i) => (Math.abs(a[i] + Math.PI/2) < 0.4) ? l > 80 : l < 15) },
      { name: "Summer-Look", desc: "Eifach e bitzli kürze überall.", check: (s) => s.every(l => l < 70 && l > 30) }
    ];
    let currentWish = WISHES[0];

    function init() {
      CW = canvas.width = 400;
      CH = canvas.height = 450;
      nextLevel();
      requestAnimationFrame(loop);
    }

    function nextLevel() {
      overlay.classList.remove('show');
      currentWish = WISHES[Math.floor(Math.random() * WISHES.length)];
      wishEl.textContent = `${currentWish.name} (${currentWish.desc})`;
      hairColor = COLORS[Math.floor(Math.random() * COLORS.length)];
      
      strands = [];
      const count = 120;
      const headRadius = 70;
      
      // Create hair strands around the top half of the head
      for(let i=0; i<count; i++) {
        const angle = -Math.PI * 1.2 + (i / (count-1)) * (Math.PI * 1.4);
        strands.push({
          angle: angle,
          length: 120 + Math.random() * 30,
          originalLength: 150,
          rootX: headRadius * Math.cos(angle),
          rootY: headRadius * Math.sin(angle)
        });
      }
    }

    function setTool(t) {
      currentTool = t;
      document.querySelectorAll('.tool').forEach(el => el.classList.remove('active'));
      document.getElementById('tool-' + t).classList.add('active');
    }

    function handleStart(x, y) {
      isDrawing = true;
      lastX = x; lastY = y;
      action(x, y);
    }

    function handleMove(x, y) {
      if(!isDrawing) return;
      action(x, y);
      lastX = x; lastY = y;
    }

    function action(mx, my) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = CW / rect.width;
      const scaleY = CH / rect.height;
      const cx = (mx - rect.left) * scaleX - CW/2;
      const cy = (my - rect.top) * scaleY - CH/2 - 20;

      strands.forEach(s => {
        const hx = CW/2 + s.rootX + Math.cos(s.angle) * s.length;
        const hy = CH/2 + 20 + s.rootY + Math.sin(s.angle) * s.length;
        
        // Distance from cursor to hair strand tip/body
        // Simplified: check distance to strand tip line
        for(let l=0; l <= s.length; l += 5) {
            const px = CW/2 + s.rootX + Math.cos(s.angle) * l;
            const py = CH/2 + 20 + s.rootY + Math.sin(s.angle) * l;
            const dist = Math.hypot(px - (cx + CW/2), py - (cy + CH/2 + 20));
            
            if(dist < 15) {
              if(currentTool === 'scissors') {
                s.length = Math.min(s.length, l);
              } else if(currentTool === 'trimmer') {
                s.length = Math.min(s.length, l * 0.8);
              } else if(currentTool === 'tonic') {
                s.length = Math.min(s.originalLength, s.length + 2);
              }
              break;
            }
        }
      });
    }

    function loop() {
      ctx.clearRect(0, 0, CW, CH);
      const bx = CW/2, by = CH/2 + 20;

      // Draw Person
      // Shoulders
      ctx.fillStyle = '#1a1a2e';
      ctx.beginPath();
      ctx.ellipse(bx, by + 120, 100, 50, 0, 0, Math.PI*2);
      ctx.fill();

      // Neck
      ctx.fillStyle = '#FDDCB5';
      ctx.fillRect(bx - 25, by + 50, 50, 40);

      // Face
      ctx.beginPath();
      ctx.arc(bx, by, 75, 0, Math.PI*2);
      ctx.fill();

      // Eyes
      ctx.fillStyle = '#333';
      ctx.beginPath(); ctx.arc(bx - 22, by - 5, 6, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(bx + 22, by - 5, 6, 0, Math.PI*2); ctx.fill();
      
      // Nose
      ctx.fillStyle = 'rgba(0,0,0,0.1)';
      ctx.beginPath(); ctx.moveTo(bx, by + 5); ctx.lineTo(bx - 5, by + 20); ctx.lineTo(bx + 5, by + 20); ctx.fill();

      // Mouth
      ctx.strokeStyle = '#c47a7a'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(bx, by + 35, 15, 0.1 * Math.PI, 0.9 * Math.PI); ctx.stroke();

      // Draw Hair Strands
      ctx.lineCap = 'round';
      strands.forEach(s => {
        const x1 = bx + s.rootX;
        const y1 = by + s.rootY;
        const x2 = x1 + Math.cos(s.angle) * s.length;
        const y2 = y1 + Math.sin(s.angle) * s.length;
        
        ctx.strokeStyle = hairColor;
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
        
        // Hair shine
        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(x1 + Math.cos(s.angle)*5, y1 + Math.sin(s.angle)*5);
        ctx.lineTo(x2 - Math.cos(s.angle)*5, y2 - Math.sin(s.angle)*5);
        ctx.stroke();
      });

      requestAnimationFrame(loop);
    }

    function finish() {
      const lengths = strands.map(s => s.length);
      const angles = strands.map(s => s.angle);
      
      // Simple evaluation logic
      let score = 0;
      let total = strands.length;
      let correct = 0;
      
      // Check each strand if it fits the wish criteria roughly
      // This is a simplified check for a game
      strands.forEach((s, i) => {
        // We evaluate based on the wish's individual logic
        // But strands are many, so we check if the majority fits
        const l = s.length;
        const a = s.angle;
        
        // Re-using the check functions but individually
        let fits = false;
        const w = currentWish.name;
        if(w === "Militär-Schnitt") fits = l < 35;
        else if(w === "Vokuhila") fits = (a > -1 && a < 1) ? l > 70 : l < 40;
        else if(w === "Boxerschnitt") fits = (a < -1 && a > -2.2) ? l > 50 : l < 25;
        else if(w === "Glatze") fits = l < 15;
        else if(w === "Igelschnitt") fits = l > 15 && l < 50;
        else if(w === "Irokese") fits = (Math.abs(a + Math.PI/2) < 0.45) ? l > 60 : l < 20;
        else if(w === "Summer-Look") fits = l < 80 && l > 20;
        
        if(fits) correct++;
      });

      const ratio = correct / total;
      let stars = 1;
      if(ratio > 0.85) stars = 5;
      else if(ratio > 0.7) stars = 4;
      else if(ratio > 0.5) stars = 3;
      else if(ratio > 0.3) stars = 2;

      showResult(stars);
    }

    function showResult(s) {
      const emojis = ['🙄', '🤨', '😐', '😊', '🤩', '👑'];
      const titles = ['Oje...', 'Naja...', 'Ganz Okay', 'Schön!', 'Perfekt!', 'Meisterwerk!'];
      const descs = [
        'De Kund erkennt sich sälber nüme im Spiegel...',
        'S hät e bitzli besser chönne si, meinsch nöd?',
        'Nöd schlecht, aber de Kund isch nöd ganz überzügt.',
        'Gueti Arbet! De Kund fühlt sich wohl.',
        'Wow! Genau so hät er sich das vorgstellt!',
        'Du bisch de absolute Scheri-Gott!'
      ];

      document.getElementById('resEmoji').textContent = emojis[s];
      document.getElementById('resTitle').textContent = titles[s];
      document.getElementById('resDesc').textContent = descs[s];
      
      const starsEl = document.getElementById('resStars');
      starsEl.innerHTML = '';
      for(let i=1; i<=5; i++) {
        const star = document.createElement('span');
        star.className = 'star' + (i > s ? ' empty' : '');
        star.textContent = '★';
        starsEl.appendChild(star);
      }

      overlay.classList.add('show');
    }

    canvas.addEventListener('touchstart', e => { handleStart(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); });
    canvas.addEventListener('touchmove', e => { handleMove(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); });
    canvas.addEventListener('touchend', () => isDrawing = false);
    
    canvas.addEventListener('mousedown', e => handleStart(e.clientX, e.clientY));
    canvas.addEventListener('mousemove', e => handleMove(e.clientX, e.clientY));
    window.addEventListener('mouseup', () => isDrawing = false);

    init();
  </script>
</body>
</html>
