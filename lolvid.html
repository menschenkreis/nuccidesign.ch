<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>LolVid — Funny Videos</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #000; --surface: #0e0e14; --text: #e8e8ed; --text-dim: #a0a0b0;
      --accent: #ff2d55; --pink: #ff2d55; --blue: #60a5fa; --white: #fff;
    }

    body {
      font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
      overflow: hidden; height: 100vh; height: 100dvh;
      -webkit-font-smoothing: antialiased; touch-action: none; user-select: none;
    }

    .feed {
      position: relative; width: 100%; height: 100vh; height: 100dvh;
      overflow: hidden;
    }

    .video-slide {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.45s;
    }

    .video-slide video {
      width: 100%; height: 100%; object-fit: cover;
    }

    .video-slide .overlay-gradient {
      position: absolute; bottom: 0; left: 0; right: 0; height: 45%;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      pointer-events: none;
    }

    /* Right sidebar */
    .sidebar {
      position: absolute; right: 12px; bottom: 100px;
      display: flex; flex-direction: column; align-items: center; gap: 20px;
      z-index: 5;
    }

    .sidebar-btn {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .sidebar-btn .icon-circle {
      width: 46px; height: 46px; border-radius: 50%;
      background: rgba(255,255,255,0.12); backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; transition: transform 0.15s, background 0.15s;
    }
    .sidebar-btn:active .icon-circle { transform: scale(0.85); background: rgba(255,255,255,0.2); }
    .sidebar-btn .count { font-size: 0.68rem; font-weight: 700; color: rgba(255,255,255,0.85); }
    .sidebar-btn.liked .icon-circle { background: var(--pink); }
    .sidebar-btn.liked .count { color: var(--pink); }

    /* Bottom info */
    .video-info {
      position: absolute; bottom: 24px; left: 14px; right: 76px; z-index: 5;
    }
    .video-info .username {
      font-weight: 800; font-size: 0.92rem; margin-bottom: 6px;
      display: flex; align-items: center; gap: 6px;
    }
    .video-info .username .verified {
      width: 14px; height: 14px; background: var(--accent); border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 0.55rem;
    }
    .video-info .description {
      font-size: 0.8rem; color: rgba(255,255,255,0.8); line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; margin-bottom: 8px;
    }
    .video-info .tags {
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .video-info .tags span {
      font-size: 0.7rem; font-weight: 700; color: var(--accent);
      background: rgba(255,45,85,0.12); padding: 3px 10px; border-radius: 100px;
    }
    .video-info .music {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.72rem; color: rgba(255,255,255,0.6); margin-top: 6px;
    }
    .video-info .music .marquee {
      overflow: hidden; max-width: 180px;
    }
    .video-info .music .marquee span {
      display: inline-block; white-space: nowrap;
      animation: marquee 8s linear infinite;
    }
    @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

    /* Top bar */
    .top-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 20;
      display: flex; justify-content: center; gap: 24px; padding: 16px 20px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
    }
    .top-bar .tab {
      font-size: 0.85rem; font-weight: 700; color: rgba(255,255,255,0.5);
      cursor: pointer; padding-bottom: 4px; border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .top-bar .tab.active { color: white; border-color: white; }

    .back-link {
      position: fixed; top: 14px; left: 14px; z-index: 25;
      color: rgba(255,255,255,0.6); text-decoration: none; font-size: 0.82rem; font-weight: 600;
      padding: 6px 12px; border-radius: 100px; border: 1px solid rgba(255,255,255,0.15);
      background: rgba(0,0,0,0.3); backdrop-filter: blur(8px); transition: all 0.2s;
    }
    .back-link:hover { color: white; border-color: rgba(255,255,255,0.3); }

    /* Loading spinner */
    .loader {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      z-index: 3;
    }
    .loader .spinner {
      width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.15);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Progress dots */
    .progress-dots {
      position: fixed; right: 6px; top: 50%; transform: translateY(-50%);
      display: flex; flex-direction: column; gap: 5px; z-index: 15;
    }
    .progress-dots .dot {
      width: 4px; height: 4px; border-radius: 50%;
      background: rgba(255,255,255,0.25); transition: all 0.3s;
    }
    .progress-dots .dot.active {
      height: 16px; border-radius: 2px; background: var(--accent);
    }

    /* Comment sheet */
    .comment-sheet {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 30;
      max-height: 60vh; background: var(--surface); border-radius: 16px 16px 0 0;
      transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
      display: flex; flex-direction: column;
    }
    .comment-sheet.open { transform: translateY(0); }
    .comment-sheet .handle {
      width: 36px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px;
      margin: 10px auto;
    }
    .comment-sheet .comments-header {
      padding: 8px 18px 14px; font-weight: 800; font-size: 0.92rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .comment-sheet .comments-list {
      flex: 1; overflow-y: auto; padding: 12px 18px;
    }
    .comment-sheet .comment {
      display: flex; gap: 10px; margin-bottom: 16px;
    }
    .comment-sheet .comment .avatar {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; background: rgba(255,255,255,0.08);
    }
    .comment-sheet .comment .body { flex: 1; }
    .comment-sheet .comment .body .name {
      font-size: 0.72rem; font-weight: 700; color: rgba(255,255,255,0.5);
      margin-bottom: 2px;
    }
    .comment-sheet .comment .body .text {
      font-size: 0.82rem; color: rgba(255,255,255,0.85); line-height: 1.4;
    }
    .comment-sheet .comment .body .meta {
      font-size: 0.65rem; color: rgba(255,255,255,0.3); margin-top: 4px;
    }
    .comment-backdrop {
      position: fixed; inset: 0; z-index: 25; background: rgba(0,0,0,0.5);
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .comment-backdrop.open { opacity: 1; pointer-events: auto; }

    /* Share toast */
    .toast {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: rgba(255,255,255,0.15); backdrop-filter: blur(16px);
      padding: 10px 22px; border-radius: 100px; font-size: 0.82rem; font-weight: 600;
      color: white; z-index: 40; opacity: 0; transition: all 0.3s; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Double-tap heart */
    .double-tap-heart {
      position: absolute; z-index: 10; pointer-events: none;
      font-size: 80px; animation: heartBurst 0.8s ease-out forwards;
    }
    @keyframes heartBurst {
      0% { transform: scale(0) rotate(-10deg); opacity: 1; }
      40% { transform: scale(1.2) rotate(5deg); opacity: 1; }
      100% { transform: scale(1.5) rotate(0deg); opacity: 0; }
    }
  </style>
</head>
<body>

          { user: 'nina_drives', avatar: '👩‍✈️', text: 'Der glücklichste Hund der Schweiz', time: '1h' },

      {

        user: '@katzen_vs_hunde', verified: true,

        tags: ['#katzen', '#hunde', '#freundschaft', '#cringe'],
        music: '🎵 Original Sound — katzen_vs_hunde',
        likes: 67400, comments: 3456, shares: 1230, bookmarks: 2890,
        commentData: [
          { user: 'tierfreund_de', avatar: '🐾', text: 'Die best friendship ever ❤️', time: '20m' },
          { user: 'katzis_ch', avatar: '🐱', text: 'Meine Katze hat auch so angefangen', time: '1h' },
          { user: 'cringe_king', avatar: '🤦', text: '2. Mal gschaut — immer noch lol', time: '2h' },
        ]
      },
      {
        src: 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/Sintel.mp4',
        user: '@welpen_tagebuch', verified: false,
        desc: 'Welpe lernt Treppen laufen — das erste Mal 🐶🪜 3 Sekunden reiner Stress',
        tags: ['#welpen', '#lernen', '#fails', '#herz'],
        music: '🎵 Cute Background Music',
        likes: 34500, comments: 1890, shares: 670, bookmarks: 1100,
        commentData: [
          { user: 'welpenfan', avatar: '🐶', text: 'ICH KANN NICHT MEHR 😭❤️', time: '45m' },
          { user: 'chillmax', avatar: '😎', text: 'Am Ende hats ihm gefallen lol', time: '2h' },
        ]
      },
    ];

    const feed = document.getElementById('feed');
    const dotsContainer = document.getElementById('dots');
    let currentIndex = 0;
    let startY = 0, isDragging = false, currentTranslate = 0, prevTranslate = 0;
    let lastTap = 0;

    // Format numbers
    function fmt(n) {
      if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
      if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
      return n.toString();
    }

    // Build slides
    videos.forEach((v, i) => {
      const slide = document.createElement('div');
      slide.className = 'video-slide';
      slide.dataset.index = i;
      slide.innerHTML = `
        <video src="${v.src}" loop muted playsinline preload="auto"></video>
        <div class="overlay-gradient"></div>
        <div class="loader"><div class="spinner"></div></div>
        <div class="sidebar">
          <div class="sidebar-btn" data-action="like" data-idx="${i}">
            <div class="icon-circle">❤️</div>
            <span class="count" id="likeCount${i}">${fmt(v.likes)}</span>
          </div>
          <div class="sidebar-btn" data-action="comment" data-idx="${i}">
            <div class="icon-circle">💬</div>
            <span class="count">${fmt(v.comments)}</span>
          </div>
          <div class="sidebar-btn" data-action="bookmark" data-idx="${i}">
            <div class="icon-circle">🔖</div>
            <span class="count">${fmt(v.bookmarks)}</span>
          </div>
          <div class="sidebar-btn" data-action="share" data-idx="${i}">
            <div class="icon-circle">↗️</div>
            <span class="count">${fmt(v.shares)}</span>
          </div>
        </div>
        <div class="video-info">
          <div class="username">${v.user} ${v.verified ? '<span class="verified">✓</span>' : ''}</div>
          <div class="description">${v.desc}</div>
          <div class="tags">${v.tags.map(t => `<span>${t}</span>`).join('')}</div>
          <div class="music"><span>🎵</span><div class="marquee"><span>${v.music} &nbsp;&nbsp;&nbsp; ${v.music}</span></div></div>
        </div>
      `;
      feed.appendChild(slide);

      // Dot
      const dot = document.createElement('div');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      dotsContainer.appendChild(dot);
    });

    const slides = feed.querySelectorAll('.video-slide');
    const dots = dotsContainer.querySelectorAll('.dot');

    function goToSlide(idx) {
      if (idx < 0 || idx >= videos.length) return;
      // Pause old
      const oldVid = slides[currentIndex]?.querySelector('video');
      if (oldVid) { oldVid.pause(); oldVid.currentTime = 0; }

      currentIndex = idx;
      feed.style.transform = `translateY(-${idx * 100}%)`;

      dots.forEach((d, i) => d.classList.toggle('active', i === idx));

      // Play new
      const newVid = slides[idx].querySelector('video');
      const loader = slides[idx].querySelector('.loader');
      if (newVid) {
        newVid.currentTime = 0;
        const playPromise = newVid.play();
        if (playPromise) playPromise.catch(() => {});
        newVid.muted = true;
      }
      // Hide loader when ready
      if (newVid) {
        newVid.addEventListener('canplay', () => loader.style.display = 'none', { once: true });
        if (newVid.readyState >= 3) loader.style.display = 'none';
      }
    }

    // First video
    goToSlide(0);

    // ── Swipe handling ──
    feed.style.transition = 'transform 0.45s cubic-bezier(0.22, 1, 0.36, 1)';

    feed.addEventListener('touchstart', e => {
      startY = e.touches[0].clientY;
      isDragging = true;
      feed.style.transition = 'none';
    }, { passive: true });

    feed.addEventListener('touchmove', e => {
      if (!isDragging) return;
      const diff = e.touches[0].clientY - startY;
      feed.style.transform = `translateY(calc(-${currentIndex * 100}% + ${diff}px))`;
    }, { passive: true });

    feed.addEventListener('touchend', e => {
      if (!isDragging) return;
      isDragging = false;
      feed.style.transition = 'transform 0.45s cubic-bezier(0.22, 1, 0.36, 1)';
      const diff = e.changedTouches[0].clientY - startY;
      if (diff < -60 && currentIndex < videos.length - 1) goToSlide(currentIndex + 1);
      else if (diff > 60 && currentIndex > 0) goToSlide(currentIndex - 1);
      else goToSlide(currentIndex);
    });

    // Mouse wheel
    let wheelLock = false;
    document.addEventListener('wheel', e => {
      if (wheelLock) return;
      wheelLock = true;
      setTimeout(() => wheelLock = false, 600);
      if (e.deltaY > 30 && currentIndex < videos.length - 1) goToSlide(currentIndex + 1);
      else if (e.deltaY < -30 && currentIndex > 0) goToSlide(currentIndex - 1);
    }, { passive: true });

    // Keyboard
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowDown' && currentIndex < videos.length - 1) goToSlide(currentIndex + 1);
      if (e.key === 'ArrowUp' && currentIndex > 0) goToSlide(currentIndex - 1);
    });

    // ── Double tap to like ──
    feed.addEventListener('click', e => {
      const now = Date.now();
      if (now - lastTap < 300) {
        // Double tap
        const btn = slides[currentIndex].querySelector('[data-action="like"]');
        if (!btn.classList.contains('liked')) btn.click();
        // Heart animation
        const heart = document.createElement('div');
        heart.className = 'double-tap-heart';
        heart.textContent = '❤️';
        heart.style.left = (e.clientX - 40) + 'px';
        heart.style.top = (e.clientY - 40) + 'px';
        slides[currentIndex].appendChild(heart);
        setTimeout(() => heart.remove(), 800);
      }
      lastTap = now;
    });

    // ── Sidebar actions ──
    document.querySelectorAll('.sidebar-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const action = btn.dataset.action;
        const idx = parseInt(btn.dataset.idx);

        if (action === 'like') {
          btn.classList.toggle('liked');
          const countEl = btn.querySelector('.count');
          const v = videos[idx];
          if (btn.classList.contains('liked')) {
            v.likes++;
            countEl.textContent = fmt(v.likes);
          } else {
            v.likes--;
            countEl.textContent = fmt(v.likes);
          }
        }

        if (action === 'comment') {
          openComments(idx);
        }

        if (action === 'share') {
          showToast('Link kopiert!');
          navigator.clipboard?.writeText(window.location.href).catch(() => {});
        }

        if (action === 'bookmark') {
          btn.classList.toggle('liked');
          showToast(btn.classList.contains('liked') ? 'Gespeichert 🔖' : 'Entfernt');
        }
      });
    });

    // ── Comments ──
    const commentSheet = document.getElementById('commentSheet');
    const commentBackdrop = document.getElementById('commentBackdrop');
    const commentsList = document.getElementById('commentsList');
    const commentsHeader = document.getElementById('commentsHeader');

    function openComments(idx) {
      const v = videos[idx];
      commentsHeader.textContent = `${v.commentData.length} Kommentare`;
      commentsList.innerHTML = v.commentData.map(c => `
        <div class="comment">
          <div class="avatar">${c.avatar}</div>
          <div class="body">
            <div class="name">${c.user}</div>
            <div class="text">${c.text}</div>
            <div class="meta">${c.time} · Antworten</div>
          </div>
        </div>
      `).join('');
      commentSheet.classList.add('open');
      commentBackdrop.classList.add('open');
    }

    function closeComments() {
      commentSheet.classList.remove('open');
      commentBackdrop.classList.remove('open');
    }
    commentBackdrop.addEventListener('click', closeComments);

    // ── Toast ──
    const toast = document.getElementById('toast');
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 1800);
    }

    // ── Tabs (cosmetic) ──
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
      });
    });
  </script>
</body>
