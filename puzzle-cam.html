<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Puzzle Cam — NucciDesigner</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #0a0a0f; --surface: #12121a; --surface-2: #1a1a26;
      --border: #252535; --text: #e8e8ed; --text-muted: #6b6880;
      --accent: #c44dff; --accent-2: #e080ff; --green: #4dff88;
    }
    [data-theme="light"] {
      --bg: #f5f3f8; --surface: #ffffff; --surface-2: #eeeaf5;
      --border: #ddd8e8; --text: #1a1a2e; --text-muted: #7a7590;
      --accent: #9333ea; --accent-2: #a855f7; --green: #22c55e;
    }

    body {
      font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
      min-height: 100vh; min-height: 100dvh; overflow: hidden;
      transition: background 0.4s, color 0.4s; -webkit-font-smoothing: antialiased;
      display: flex; flex-direction: column;
    }

    /* Nav */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: var(--bg); border-bottom: 1px solid var(--border);
      padding: 10px 16px; transition: background 0.4s, border-color 0.4s;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    }
    nav .inner { max-width: 600px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
    .back-link { color: var(--text-muted); text-decoration: none; font-size: 0.82rem; font-weight: 600; }
    .back-link:hover { color: var(--text); }
    .nav-title { font-weight: 800; font-size: 0.9rem; }
    .theme-btn {
      background: none; border: 1px solid var(--border); border-radius: 10px;
      width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text-muted); transition: all 0.2s; padding: 0;
    }
    .theme-btn:hover { border-color: var(--accent); color: var(--accent); }
    .icon-moon { display: none; }
    [data-theme="light"] .icon-sun { display: none; }
    [data-theme="light"] .icon-moon { display: block; }

    /* Screens */
    .screen {
      position: fixed; inset: 0; z-index: 50;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 20px; transition: opacity 0.4s, transform 0.4s;
    }
    .screen.hidden { opacity: 0; pointer-events: none; transform: scale(0.95); }

    .upload-screen { background: var(--bg); }
    .upload-icon { font-size: 3.5rem; margin-bottom: 16px; }
    .upload-title { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.04em; margin-bottom: 8px; text-align: center; }
    .upload-title .gradient {
      background: linear-gradient(135deg, var(--accent), #ff6b9d, #f7c948);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .upload-sub { color: var(--text-muted); font-size: 0.82rem; text-align: center; margin-bottom: 24px; line-height: 1.6; }

    .upload-actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; max-width: 400px; }
    .upload-btn {
      flex: 1; min-width: 140px; padding: 16px 20px; border-radius: 16px;
      border: 2px dashed var(--border); background: var(--surface);
      color: var(--text); font-size: 0.85rem; font-weight: 600;
      font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.3s; text-align: center;
    }
    .upload-btn:hover { border-color: var(--accent); transform: translateY(-2px); }
    .upload-btn .bi { font-size: 1.4rem; display: block; margin-bottom: 6px; }
    .upload-btn.primary { border-style: solid; border-color: var(--accent); background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: white; }
    .upload-btn.primary:hover { box-shadow: 0 8px 30px rgba(196,77,255,0.3); }

    /* Difficulty */
    .diff-row { display: flex; gap: 8px; margin-top: 20px; }
    .diff-btn {
      padding: 8px 18px; border-radius: 100px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text-muted); font-size: 0.78rem; font-weight: 700;
      font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.2s;
    }
    .diff-btn:hover { border-color: var(--accent); color: var(--accent); }
    .diff-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

    /* Game screen */
    .game-screen { background: var(--bg); justify-content: flex-start; padding-top: 56px; }

    .game-hud {
      width: 100%; max-width: 500px; padding: 10px 4px;
      display: flex; justify-content: space-between; align-items: center;
      font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--text-muted);
    }
    .hud-item { display: flex; align-items: center; gap: 4px; }
    .hud-val { color: var(--accent); font-weight: 700; }

    .puzzle-board {
      position: relative; width: 100%; max-width: 500px;
      aspect-ratio: 1; margin: 0 auto;
      border-radius: 12px; overflow: hidden;
      background: var(--surface); touch-action: none;
    }
    .puzzle-board canvas { width: 100%; height: 100%; display: block; }

    .piece {
      position: absolute; cursor: grab;
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      touch-action: none;
      will-change: transform;
    }
    .piece:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.4); z-index: 10; }
    .piece.dragging { cursor: grabbing; box-shadow: 0 8px 30px rgba(196,77,255,0.4); z-index: 100; }
    .piece.placed {
      border-color: transparent; box-shadow: none; cursor: default; pointer-events: none;
    }
    .piece.snapping { transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .piece.snapping-back { transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1); }

    .preview-toggle {
      width: 100%; max-width: 500px; padding: 12px 0 4px;
      display: flex; justify-content: center;
    }
    .preview-btn {
      padding: 8px 20px; border-radius: 100px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text-muted); font-size: 0.78rem; font-weight: 700;
      font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.2s;
    }
    .preview-btn:hover { border-color: var(--accent); color: var(--accent); }

    .game-controls {
      width: 100%; max-width: 500px; padding: 8px 0 20px;
      display: flex; gap: 8px; justify-content: center;
    }
    .ctrl-btn {
      padding: 8px 18px; border-radius: 100px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text-muted); font-size: 0.78rem; font-weight: 700;
      font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.2s;
    }
    .ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Win overlay */
    .win-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
      display: none; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px; padding: 20px;
    }
    .win-overlay.show { display: flex; }
    .win-emoji { font-size: 4rem; animation: winBounce 0.6s ease-out; }
    @keyframes winBounce { 0% { transform: scale(0); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
    .win-title { font-size: 1.8rem; font-weight: 900; color: white; }
    .win-stats { font-size: 0.9rem; color: rgba(255,255,255,0.7); text-align: center; line-height: 1.8; }
    .win-btn {
      padding: 14px 32px; border-radius: 100px; border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: white;
      font-size: 0.9rem; font-weight: 700; font-family: 'Inter', sans-serif;
      cursor: pointer; transition: transform 0.2s;
    }
    .win-btn:hover { transform: scale(1.05); }

    input[type="file"] { display: none; }
  </style>
</head>
<body>

  <nav>
    <div class="inner">
      <a href="index.html" class="back-link">← Zrugg</a>
      <div class="nav-title">🧩 Puzzle Cam</div>
      <button class="theme-btn" onclick="toggleTheme()" aria-label="Theme">
        <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </nav>

  <!-- Upload -->
  <div class="screen upload-screen" id="uploadScreen">
    <div class="upload-icon">🧩</div>
    <h1 class="upload-title">Foto z<span class="gradient">Puzzel</span></h1>
    <p class="upload-sub">Fotografiere öppis um di ume und lööses Puzzle!</p>
    <div class="upload-actions">
      <label class="upload-btn primary">
        <span class="bi">📸</span>Foto mache
        <input type="file" id="cameraInput" accept="image/*" capture="environment">
      </label>
      <label class="upload-btn">
        <span class="bi">🖼️</span>Galerie
        <input type="file" id="fileInput" accept="image/*">
      </label>
    </div>
    <div class="diff-row">
      <button class="diff-btn" data-grid="3">3×3</button>
      <button class="diff-btn active" data-grid="4">4×4</button>
      <button class="diff-btn" data-grid="5">5×5</button>
      <button class="diff-btn" data-grid="6">6×6</button>
    </div>
  </div>

  <!-- Game -->
  <div class="screen game-screen hidden" id="gameScreen">
    <div class="game-hud">
      <div class="hud-item">🕐 <span class="hud-val" id="timer">0:00</span></div>
      <div class="hud-item">🧩 <span class="hud-val" id="moves">0</span></div>
      <div class="hud-item">✅ <span class="hud-val" id="placed">0</span>/<span id="total">16</span></div>
    </div>
    <div class="puzzle-board" id="board"></div>
    <div class="preview-toggle">
      <button class="preview-btn" id="previewBtn">👁 Zeig Vorlag</button>
    </div>
    <div class="game-controls">
      <button class="ctrl-btn" onclick="shufflePieces()">🔀 Mische</button>
      <button class="ctrl-btn" onclick="showHint()">💡 Hiif</button>
      <button class="ctrl-btn" onclick="newGame()">🔄 Nöis</button>
    </div>
  </div>

  <!-- Win -->
  <div class="win-overlay" id="winOverlay">
    <div class="win-emoji">🎉</div>
    <div class="win-title">Fertig!</div>
    <div class="win-stats" id="winStats"></div>
    <button class="win-btn" onclick="newGame()">🔄 Nöis Spiel</button>
  </div>

  <script>
    // Theme
    function setTheme(t) { document.documentElement.setAttribute('data-theme', t); localStorage.setItem('theme', t); }
    const st = localStorage.getItem('theme');
    if (st) setTheme(st);
    else if (window.matchMedia('(prefers-color-scheme: light)').matches) setTheme('light');
    function toggleTheme() { setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }

    // State
    let gridSize = 4;
    let img = null;
    let pieces = [];
    let moves = 0;
    let placed = 0;
    let timerInterval = null;
    let startTime = 0;
    let showingPreview = false;
    let boardRect = null;

    const board = document.getElementById('board');

    // Difficulty
    document.querySelectorAll('.diff-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        gridSize = parseInt(btn.dataset.grid);
      });
    });

    // File inputs
    document.getElementById('cameraInput').addEventListener('change', e => handleFile(e.target.files[0]));
    document.getElementById('fileInput').addEventListener('change', e => handleFile(e.target.files[0]));

    function handleFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => startGame(e.target.result);
      reader.readAsDataURL(file);
    }

    function startGame(src) {
      const image = new Image();
      image.crossOrigin = 'anonymous';
      image.onload = () => {
        img = image;
        document.getElementById('uploadScreen').classList.add('hidden');
        document.getElementById('gameScreen').classList.remove('hidden');
        document.getElementById('total').textContent = gridSize * gridSize;
        initPuzzle();
      };
      image.src = src;
    }

    function initPuzzle() {
      board.innerHTML = '';
      pieces = [];
      moves = 0; placed = 0;
      startTime = Date.now();
      document.getElementById('moves').textContent = '0';
      document.getElementById('placed').textContent = '0';
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(updateTimer, 1000);

      const size = board.clientWidth;
      const pw = size / gridSize;
      const ph = size / gridSize;

      // Create pieces in order
      for (let row = 0; row < gridSize; row++) {
        for (let col = 0; col < gridSize; col++) {
          const piece = document.createElement('div');
          piece.className = 'piece';
          piece.style.width = pw + 'px';
          piece.style.height = ph + 'px';
          piece.style.backgroundImage = `url(${img.src})`;
          piece.style.backgroundSize = `${size}px ${size}px`;
          piece.style.backgroundPosition = `-${col * pw}px -${row * ph}px`;
          piece.dataset.row = row;
          piece.dataset.col = col;
          piece.dataset.correctX = col * pw;
          piece.dataset.correctY = row * ph;
          piece.dataset.gridX = col * pw;
          piece.dataset.gridY = row * ph;

          // Drag
          piece.addEventListener('pointerdown', onDragStart);

          board.appendChild(piece);
          pieces.push(piece);
        }
      }

      // Shuffle positions
      shufflePieces();
    }

    function shufflePieces() {
      placed = 0;
      moves = 0;
      startTime = Date.now();
      document.getElementById('moves').textContent = '0';
      document.getElementById('placed').textContent = '0';
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(updateTimer, 1000);

      const size = board.clientWidth;
      const pw = size / gridSize;
      const positions = [];
      for (let i = 0; i < gridSize * gridSize; i++) {
        positions.push({ x: (i % gridSize) * pw, y: Math.floor(i / gridSize) * pw });
      }
      for (let i = positions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [positions[i], positions[j]] = [positions[j], positions[i]];
      }
      let solved = positions.every((p, i) => p.x === parseFloat(pieces[i].dataset.correctX) && p.y === parseFloat(pieces[i].dataset.correctY));
      if (solved && positions.length > 1) [positions[0], positions[1]] = [positions[1], positions[0]];

      pieces.forEach((piece, i) => {
        piece.classList.remove('placed', 'dragging', 'snapping', 'snapping-back');
        piece.dataset.gridX = positions[i].x;
        piece.dataset.gridY = positions[i].y;
        piece.style.transform = `translate(${positions[i].x}px, ${positions[i].y}px)`;
        piece.style.pointerEvents = '';
      });
    }

    function showHint() {
      pieces.forEach(piece => {
        if (piece.classList.contains('placed')) return;
        const cx = parseFloat(piece.dataset.correctX);
        const cy = parseFloat(piece.dataset.correctY);
        piece.classList.add('snapping');
        piece.style.transform = `translate(${cx}px, ${cy}px)`;
        piece.dataset.gridX = cx;
        piece.dataset.gridY = cy;
        setTimeout(() => piece.classList.remove('snapping'), 350);
      });
    }

    // Dragging — uses transform for GPU acceleration
    let dragPiece = null;
    let dragOffsetX = 0, dragOffsetY = 0;
    let startGX = 0, startGY = 0;
    let boardX = 0, boardY = 0;

    function onDragStart(e) {
      if (e.target.classList.contains('placed') || e.target.classList.contains('snapping')) return;
      e.preventDefault();
      e.stopPropagation();

      dragPiece = e.target;
      dragPiece.classList.add('dragging');
      dragPiece.classList.remove('snapping', 'snapping-back');

      const boardRect = board.getBoundingClientRect();
      boardX = boardRect.left;
      boardY = boardRect.top;

      const gx = parseFloat(dragPiece.dataset.gridX);
      const gy = parseFloat(dragPiece.dataset.gridY);
      startGX = gx;
      startGY = gy;

      dragOffsetX = e.clientX - boardX - gx;
      dragOffsetY = e.clientY - boardY - gy;

      document.addEventListener('pointermove', onDragMove, { passive: false });
      document.addEventListener('pointerup', onDragEnd);
    }

    function onDragMove(e) {
      if (!dragPiece) return;
      e.preventDefault();
      const x = e.clientX - boardX - dragOffsetX;
      const y = e.clientY - boardY - dragOffsetY;
      dragPiece.style.transform = `translate(${x}px, ${y}px)`;
    }

    function onDragEnd(e) {
      if (!dragPiece) return;
      document.removeEventListener('pointermove', onDragMove);
      document.removeEventListener('pointerup', onDragEnd);

      dragPiece.classList.remove('dragging');
      moves++;
      document.getElementById('moves').textContent = moves;

      const size = board.clientWidth;
      const pw = size / gridSize;
      const cx = parseFloat(dragPiece.dataset.correctX);
      const cy = parseFloat(dragPiece.dataset.correctY);

      // Get current position from transform
      const style = dragPiece.style.transform;
      const match = style.match(/translate\(([\d.-]+)px,\s*([\d.-]+)px\)/);
      const currentX = match ? parseFloat(match[1]) : 0;
      const currentY = match ? parseFloat(match[2]) : 0;
      const snapDist = pw * 0.4;

      if (Math.abs(currentX - cx) < snapDist && Math.abs(currentY - cy) < snapDist) {
        // Check if spot is free
        const occupied = pieces.some(p => {
          if (p === dragPiece || p.classList.contains('placed')) return false;
          const pgx = parseFloat(p.dataset.gridX);
          const pgy = parseFloat(p.dataset.gridY);
          return Math.abs(pgx - cx) < pw * 0.5 && Math.abs(pgy - cy) < pw * 0.5;
        });

        if (!occupied) {
          dragPiece.classList.add('snapping');
          dragPiece.style.transform = `translate(${cx}px, ${cy}px)`;
          dragPiece.dataset.gridX = cx;
          dragPiece.dataset.gridY = cy;
          dragPiece.classList.add('placed');
          placed++;
          document.getElementById('placed').textContent = placed;
          setTimeout(() => dragPiece.classList.remove('snapping'), 250);
          if (placed === gridSize * gridSize) setTimeout(winGame, 300);
        } else {
          dragPiece.classList.add('snapping-back');
          dragPiece.style.transform = `translate(${startGX}px, ${startGY}px)`;
          dragPiece.dataset.gridX = startGX;
          dragPiece.dataset.gridY = startGY;
          setTimeout(() => dragPiece.classList.remove('snapping-back'), 300);
        }
      } else {
        // Snap to nearest grid
        const snapX = Math.round(currentX / pw) * pw;
        const snapY = Math.round(currentY / pw) * pw;
        dragPiece.classList.add('snapping');
        dragPiece.style.transform = `translate(${snapX}px, ${snapY}px)`;
        dragPiece.dataset.gridX = snapX;
        dragPiece.dataset.gridY = snapY;
        setTimeout(() => dragPiece.classList.remove('snapping'), 250);
      }

      dragPiece = null;
    }

    // Preview
    document.getElementById('previewBtn').addEventListener('click', () => {
      showingPreview = !showingPreview;
      const btn = document.getElementById('previewBtn');
      if (showingPreview) {
        pieces.forEach(p => {
          if (!p.classList.contains('placed')) {
            p.style.opacity = '0.15';
            p.style.transition = 'opacity 0.3s';
          }
        });
        btn.textContent = '🙈 Versteck';
      } else {
        pieces.forEach(p => { p.style.opacity = ''; p.style.transition = ''; });
        btn.textContent = '👁 Zeig Vorlag';
      }
    });

    // Timer
    function updateTimer() {
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      const m = Math.floor(elapsed / 60);
      const s = elapsed % 60;
      document.getElementById('timer').textContent = `${m}:${s.toString().padStart(2, '0')}`;
    }

    // Win
    function winGame() {
      if (timerInterval) clearInterval(timerInterval);
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      const m = Math.floor(elapsed / 60);
      const s = elapsed % 60;

      document.getElementById('winStats').innerHTML =
        `⏱ ${m}:${s.toString().padStart(2, '0')}<br>` +
        `🧩 ${moves} Züg<br>` +
        `📐 ${gridSize}×${gridSize} Puzzle`;
      document.getElementById('winOverlay').classList.add('show');
    }

    function newGame() {
      document.getElementById('winOverlay').classList.remove('show');
      document.getElementById('gameScreen').classList.add('hidden');
      document.getElementById('uploadScreen').classList.remove('hidden');
      if (timerInterval) clearInterval(timerInterval);
      document.getElementById('cameraInput').value = '';
      document.getElementById('fileInput').value = '';
    }

    // Handle resize
    window.addEventListener('resize', () => {
      if (img && !document.getElementById('gameScreen').classList.contains('hidden')) {
        // Could re-init but simpler to just note it
      }
    });
  </script>
</body>
</html>
